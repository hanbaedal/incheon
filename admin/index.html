<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>관리자 콘솔 | 근로복지공단 인천병원 장례식장</title>
  <link rel="stylesheet" href="assets/admin.css" />
</head>
<body>
  <div class="admin-shell">
    <header class="admin-header">
      <div class="admin-header-top">
        <div class="admin-brand">
          <strong>관리자 콘솔</strong>
          <span>근로복지공단 인천병원 장례식장</span>
        </div>
        <nav class="main-nav" id="mainNav" aria-label="메인 메뉴"></nav>
        <div class="admin-user">
          <a href="/" target="_blank" class="home-link">홈페이지 →</a>
          <span class="who" id="whoName"></span>
          <button type="button" id="logoutBtn" class="btn btn-sm">로그아웃</button>
        </div>
      </div>
      <div class="sub-nav" id="subNav" hidden></div>
    </header>

    <main class="admin-main">
      <div class="page-head">
        <h2 id="viewTitle">대시보드</h2>
      </div>
      <div class="content" id="content"><div class="empty">불러오는 중…</div></div>
    </main>
  </div>

  <div class="modal-back" id="modalBack">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modalTitle">제목</h3>
        <button class="x" id="modalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-foot" id="modalFoot"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="doc-modal-back" id="docModalBack" aria-hidden="true">
    <div class="doc-modal" role="dialog" aria-modal="true" aria-labelledby="docModalTitle">
      <div class="doc-modal-head">
        <h3 id="docModalTitle">문서</h3>
        <button type="button" class="doc-modal-x" id="docModalClose" aria-label="닫기">&times;</button>
      </div>
      <div class="doc-modal-body" id="docModalBody"></div>
      <div class="doc-modal-foot">
        <button type="button" class="btn" id="docModalClose2">닫기</button>
        <button type="button" class="btn btn-primary" id="docModalPrint">인쇄</button>
      </div>
    </div>
  </div>

  <style id="docInlineStyle"></style>
  <script src="/assets/js/order-doc.js"></script>
  <script>document.getElementById("docInlineStyle").textContent = typeof DOC_STYLES !== "undefined" ? DOC_STYLES : "";</script>
  <script src="assets/admin.js"></script>
</body>
</html>
