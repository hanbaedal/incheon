<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>관리자 콘솔 | 근로복지공단 인천병원 장례식장</title>
  <link rel="stylesheet" href="assets/admin.css" />
</head>
<body>
  <div class="layout">
    <aside class="side">
      <div class="side-brand">
        <strong>관리자 콘솔</strong>
        <span>근로복지공단 인천병원 장례식장</span>
      </div>
      <nav class="side-nav" id="sideNav">
        <a href="#dashboard" data-view="dashboard">대시보드</a>
        <a href="#halls" data-view="halls">빈소 관리</a>
        <a href="#families" data-view="families">상주 계정</a>
        <a href="#hallRequests" data-view="hallRequests">빈소 신청 <span class="badge" id="navHallReqBadge" style="display:none">0</span></a>
        <div class="nav-group">
          <span class="nav-group-label">상품 관리</span>
          <a href="#prodCoffin" data-view="prodCoffin">관</a>
          <a href="#prodHoengdae" data-view="prodHoengdae">횡대</a>
          <a href="#prodShroud" data-view="prodShroud">수의</a>
          <a href="#prodAccessory" data-view="prodAccessory">부속물품</a>
        </div>
        <div class="nav-group">
          <span class="nav-group-label">영정 사진</span>
          <a href="#prodPhotoPortrait" data-view="prodPhotoPortrait">영정</a>
          <a href="#prodPhotoFrame" data-view="prodPhotoFrame">액자</a>
          <a href="#prodPhotoId" data-view="prodPhotoId">증명사진</a>
          <a href="#prodPhotoInstant" data-view="prodPhotoInstant">즉석사진</a>
        </div>
        <div class="nav-group">
          <span class="nav-group-label">근조 화환</span>
          <a href="#prodFlowerAltar" data-view="prodFlowerAltar">제단장식</a>
          <a href="#prodFlowerBasket" data-view="prodFlowerBasket">근조바구니</a>
          <a href="#prodFlowerWreath" data-view="prodFlowerWreath">조문용 조화</a>
          <a href="#prodFlowerChrys" data-view="prodFlowerChrys">헌화용 국화</a>
          <a href="#prodFlowerCoffin" data-view="prodFlowerCoffin">관장식</a>
          <a href="#prodFlowerVehicle" data-view="prodFlowerVehicle">차량장식</a>
        </div>
        <div class="nav-group">
          <span class="nav-group-label">상복 대여</span>
          <a href="#prodDress" data-view="prodDress">상복 대여</a>
        </div>
        <div class="nav-group">
          <span class="nav-group-label">운구·차량</span>
          <a href="#prodHearseCadillac" data-view="prodHearseCadillac">캐딜락</a>
          <a href="#prodHearseLimousine" data-view="prodHearseLimousine">고급리무진</a>
        </div>
        <div class="nav-group">
          <span class="nav-group-label">접객 음식</span>
          <a href="#prodFoodMeal" data-view="prodFoodMeal">식사류</a>
          <a href="#prodFoodAnju" data-view="prodFoodAnju">안주류</a>
          <a href="#prodFoodTteok" data-view="prodFoodTteok">떡류</a>
          <a href="#prodFoodFruit" data-view="prodFoodFruit">과일류</a>
          <a href="#prodFoodJesa" data-view="prodFoodJesa">제사상</a>
          <a href="#prodFoodBeverage" data-view="prodFoodBeverage">식음료류</a>
          <a href="#prodFoodConsumables" data-view="prodFoodConsumables">공산품류</a>
        </div>
        <a href="#orders" data-view="orders">주문 관리 <span class="badge" id="navOrderBadge" style="display:none">0</span></a>
        <a href="#notices" data-view="notices">알림 소식</a>
        <a href="#inquiries" data-view="inquiries">온라인 문의 <span class="badge" id="navInqBadge" style="display:none">0</span></a>
        <a href="#memorials" data-view="memorials">추모글 관리</a>
      </nav>
      <div class="side-foot">
        <p class="muted" id="whoName" style="margin:0 0 10px;color:#8b93a7"></p>
        <button id="logoutBtn">로그아웃</button>
      </div>
    </aside>

    <div class="main">
      <div class="topbar">
        <h2 id="viewTitle">대시보드</h2>
        <span class="who"><a href="/" target="_blank" style="color:var(--gold);font-weight:600">홈페이지 보기 →</a></span>
      </div>
      <div class="content" id="content"><div class="empty">불러오는 중…</div></div>
    </div>
  </div>

  <div class="modal-back" id="modalBack">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modalTitle">제목</h3>
        <button class="x" id="modalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-foot" id="modalFoot"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="doc-modal-back" id="docModalBack" aria-hidden="true">
    <div class="doc-modal" role="dialog" aria-modal="true" aria-labelledby="docModalTitle">
      <div class="doc-modal-head">
        <h3 id="docModalTitle">문서</h3>
        <button type="button" class="doc-modal-x" id="docModalClose" aria-label="닫기">&times;</button>
      </div>
      <div class="doc-modal-body" id="docModalBody"></div>
      <div class="doc-modal-foot">
        <button type="button" class="btn" id="docModalClose2">닫기</button>
        <button type="button" class="btn btn-primary" id="docModalPrint">인쇄</button>
      </div>
    </div>
  </div>

  <style id="docInlineStyle"></style>
  <script src="/assets/js/order-doc.js"></script>
  <script>document.getElementById("docInlineStyle").textContent = typeof DOC_STYLES !== "undefined" ? DOC_STYLES : "";</script>
  <script src="assets/admin.js"></script>
</body>
</html>
