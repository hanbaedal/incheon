<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>문서 출력 | 근로복지공단 인천병원 장례식장</title>
  <style>
    :root { --navy:#1f2a44; --line:#333; --soft:#f2f2ee; }
    * { box-sizing: border-box; }
    body { margin:0; background:#e9e8e4; font-family:"Malgun Gothic","Apple SD Gothic Neo",system-ui,sans-serif; color:#1a1a1a; font-size:13px; }
    .bar { background:var(--navy); color:#fff; padding:12px 20px; display:flex; gap:10px; align-items:center; justify-content:center; flex-wrap:wrap; }
    .bar button, .bar a { padding:8px 16px; border-radius:8px; border:1px solid rgba(255,255,255,.3); background:transparent; color:#fff; cursor:pointer; font-size:13px; font-weight:600; text-decoration:none; display:inline-block; }
    .bar button.primary { background:#a98b52; border-color:#a98b52; }
    .sheet-wrap { padding: 20px 0; }
    .loading { text-align:center; padding:80px 0; color:#666; }
    @media print {
      body { background:#fff; }
      .bar { display:none; }
      .sheet-wrap { padding:0; }
    }
  </style>
  <style id="docStyle"></style>
</head>
<body>
  <div class="bar">
    <button type="button" id="backBtn" data-mi18n="doc.back">← 돌아가기</button>
    <span id="barTitle" style="color:#fff;font-weight:700;margin-right:10px"></span>
    <button class="primary" onclick="window.print()" data-mi18n="common.print">인쇄</button>
  </div>

  <div class="sheet-wrap" id="sheet"><div class="loading" data-mi18n="doc.loading">문서를 불러오는 중…</div></div>

  <script src="../../assets/js/member-i18n.js"></script>
  <script src="../../assets/js/order-doc.js"></script>
  <script>
    document.getElementById("docStyle").textContent = DOC_STYLES;
    mApplyI18n(document);
    mPageTitle("doc.pageTitle");

    const params = new URLSearchParams(location.search);
    const orderId = params.get("id");
    const familyUserId = params.get("familyUserId");
    let type = params.get("type") || "order";
    const aggregate = params.get("aggregate") === "1" || type === "summary";
    const from = params.get("from") || "";
    if (type === "summary") type = "order";

    const AGG_LABELS = {
      order: mT("orders.docAggOrder"),
      statement: mT("orders.docStatement"),
      tax: mT("orders.docTax"),
    };
    const ORDER_LABELS = {
      order: mT("orders.docOrder"),
      statement: mT("orders.docStatement"),
      tax: mT("orders.docTax"),
    };

    document.getElementById("backBtn").addEventListener("click", () => {
      if (from === "admin") {
        location.href = "/admin/#orders";
        return;
      }
      if (document.referrer && document.referrer.includes(location.host)) {
        history.back();
        return;
      }
      location.href = "/pages/member/orders.html";
    });

    async function fetchOrder(id) {
      const res = await fetch("/api/orders/" + encodeURIComponent(id), { credentials: "same-origin" });
      let data = null;
      try { data = await res.json(); } catch (e) {}
      if (res.status === 401) {
        location.href = "/pages/member/login.html?next=" + encodeURIComponent(location.pathname + location.search);
        throw new Error(mT("doc.needLogin"));
      }
      if (!res.ok) throw new Error((data && data.error) || mT("doc.loadOrderFail"));
      return data.order;
    }

    async function fetchSummary() {
      const url = familyUserId
        ? "/api/orders/admin/summary?familyUserId=" + encodeURIComponent(familyUserId)
        : "/api/orders/mine/summary";
      const res = await fetch(url, { credentials: "same-origin" });
      let data = null;
      try { data = await res.json(); } catch (e) {}
      if (res.status === 401) {
        location.href = "/pages/member/login.html?next=" + encodeURIComponent(location.pathname + location.search);
        throw new Error(mT("doc.needLogin"));
      }
      if (!res.ok) throw new Error((data && data.error) || mT("doc.loadSummaryFail"));
      return data;
    }

    (async function () {
      try {
        let html = "";
        let title = "";
        if (aggregate) {
          const s = await fetchSummary();
          html = buildAggregateDocHtml(s, type);
          title = AGG_LABELS[type] || DOC_TITLES[type];
        } else {
          if (!orderId) {
            document.getElementById("sheet").innerHTML = `<div class="loading">${mT("doc.noOrder")}</div>`;
            return;
          }
          const o = await fetchOrder(orderId);
          html = buildOrderDocHtml(o, type);
          title = ORDER_LABELS[type] || DOC_TITLES[type];
        }
        document.getElementById("barTitle").textContent = title;
        document.getElementById("sheet").innerHTML = html;
      } catch (e) {
        document.getElementById("sheet").innerHTML = `<div class="loading">${mT("common.errorPrefix")}${docEsc(e.message)}</div>`;
      }
    })();
  </script>
</body>
</html>
