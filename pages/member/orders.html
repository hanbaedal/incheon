<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>내 주문 | 상주 전용 서비스</title>
  <link rel="stylesheet" href="../../assets/css/member.css" />
  <style id="docInlineStyle"></style>
</head>
<body>
  <header id="mHeader"></header>
  <div class="m-wrap">
    <h1 class="m-title">내 예약 내역</h1>
    <p class="m-lead">예약하신 내역과 처리 상태를 확인하실 수 있습니다. 사후정산 품목은 발인 전 관리자가 실사용 수량을 정산합니다.</p>
    <div id="okBox"></div>
    <div id="ordArea" class="card"><div class="state">주문 내역을 불러오는 중…</div></div>
  </div>

  <div id="docModal" class="doc-modal-back" aria-hidden="true">
    <div class="doc-modal" role="dialog" aria-modal="true" aria-labelledby="docModalTitle">
      <div class="doc-modal-head">
        <h3 id="docModalTitle">문서</h3>
        <button type="button" class="doc-modal-x" id="docModalClose" aria-label="닫기">×</button>
      </div>
      <div class="doc-modal-body" id="docModalBody"></div>
      <div class="doc-modal-foot">
        <button type="button" class="btn" id="docModalClose2">닫기</button>
        <button type="button" class="btn btn-primary" id="docModalPrint">인쇄</button>
      </div>
    </div>
  </div>

  <script src="../../assets/js/member.js"></script>
  <script src="../../assets/js/order-doc.js"></script>
  <script>
    document.getElementById("docInlineStyle").textContent = DOC_STYLES;

    let ME = null;
    let SUMMARY = null;
    let modalHtml = "";

    (async function () {
      ME = await memberHeader("orders");
      if (!ME) return;

      const ok = new URLSearchParams(location.search).get("ok");
      if (ok) {
        document.getElementById("okBox").innerHTML =
          `<div class="notice-box success">예약이 정상 접수되었습니다. (예약번호 ${mEsc(ok)})</div>`;
      }
      bindModal();
      await load();
    })();

    function bindModal() {
      const back = document.getElementById("docModal");
      const close = () => {
        back.classList.remove("open");
        back.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
      };
      document.getElementById("docModalClose").addEventListener("click", close);
      document.getElementById("docModalClose2").addEventListener("click", close);
      back.addEventListener("click", (e) => { if (e.target === back) close(); });
      document.getElementById("docModalPrint").addEventListener("click", () => {
        printDocHtml(modalHtml, document.getElementById("docModalTitle").textContent);
      });
    }

    function openDocModal(title, html) {
      modalHtml = html;
      document.getElementById("docModalTitle").textContent = title;
      document.getElementById("docModalBody").innerHTML = html;
      const back = document.getElementById("docModal");
      back.classList.add("open");
      back.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    async function showOrderDoc(orderId) {
      const data = await mApi("/orders/" + orderId);
      const html = buildOrderDocHtml(data.order, "order");
      openDocModal("주문서 · " + data.order.orderNumber, html);
    }

    async function showAggregateDoc(type) {
      if (!SUMMARY) SUMMARY = await mApi("/orders/mine/summary");
      if (!SUMMARY.orderCount) {
        mToast("집계할 주문이 없습니다.");
        return;
      }
      const labels = { order: "주문서 합계", statement: "거래명세서", tax: "세금계산서" };
      const html = buildAggregateDocHtml(SUMMARY, type);
      openDocModal(labels[type] || "문서", html);
    }

    async function load() {
      const area = document.getElementById("ordArea");
      try {
        const [listRes, sumRes] = await Promise.all([
          mApi("/orders/mine"),
          mApi("/orders/mine/summary"),
        ]);
        SUMMARY = sumRes;
        const items = listRes.items;

        if (items.length === 0) {
          area.innerHTML = '<div class="state">예약 내역이 없습니다. <a href="/pages/member/shop.html" class="link-gold">장례 예약하기 →</a></div>';
          return;
        }

        const hasSummary = SUMMARY && SUMMARY.orderCount > 0;
        area.innerHTML = `
          <div class="card-head">건별 예약 내역</div>
          <div class="card-body flush">
          <table class="tbl">
            <thead><tr><th>주문번호</th><th>주요 품목</th><th class="right">합계</th><th>상태</th><th class="nowrap">주문일</th><th class="right">문서</th></tr></thead>
            <tbody>${items.map((o) => `
              <tr>
                <td class="nowrap"><b>${mEsc(o.orderNumber)}</b></td>
                <td>${mEsc(o.items[0] ? o.items[0].name : "-")}${o.items.length > 1 ? ` 외 ${o.items.length - 1}건` : ""}</td>
                <td class="right nowrap">${won(o.totalAmount)}</td>
                <td><span class="tag ${o.status}">${MEMBER_STATUS[o.status] || o.status}</span></td>
                <td class="nowrap">${mFmtDay(o.createdAt)}</td>
                <td class="right nowrap">
                  <button type="button" class="btn btn-sm" data-order-id="${mEsc(o.id)}">주문서</button>
                </td>
              </tr>`).join("")}</tbody>
          </table>
          ${hasSummary ? `
          <div class="doc-actions">
            <p class="doc-actions-lead">발인 정산 · 취소 제외 ${SUMMARY.orderCount}건 합계</p>
            <div class="doc-actions-btns">
              <button type="button" class="btn btn-primary" data-agg="order">주문서 합계</button>
              <button type="button" class="btn" data-agg="statement">거래명세서</button>
              <button type="button" class="btn" data-agg="tax">세금계산서</button>
            </div>
          </div>` : ""}
          </div>`;

        area.querySelectorAll("[data-order-id]").forEach((btn) => {
          btn.addEventListener("click", async () => {
            btn.disabled = true;
            try { await showOrderDoc(btn.getAttribute("data-order-id")); }
            catch (e) { mToast(e.message); }
            finally { btn.disabled = false; }
          });
        });

        area.querySelectorAll("[data-agg]").forEach((btn) => {
          btn.addEventListener("click", async () => {
            btn.disabled = true;
            try { await showAggregateDoc(btn.getAttribute("data-agg")); }
            catch (e) { mToast(e.message); }
            finally { btn.disabled = false; }
          });
        });
      } catch (e) {
        area.innerHTML = `<div class="state">오류: ${mEsc(e.message)}</div>`;
      }
    }
  </script>
</body>
</html>
