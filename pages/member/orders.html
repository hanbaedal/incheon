<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>내 예약 | 상주 전용 서비스</title>
  <link rel="stylesheet" href="../../assets/css/member.css" />
  <style id="docInlineStyle"></style>
</head>
<body>
  <header id="mHeader"></header>
  <div class="m-wrap">
    <h1 class="m-title" data-mi18n="orders.title">내 예약 내역</h1>
    <p class="m-lead" data-mi18n="orders.lead">예약하신 내역과 처리 상태를 확인하실 수 있습니다. 사후정산 품목은 발인 전 관리자가 실사용 수량을 정산합니다.</p>
    <div id="okBox"></div>
    <div id="ordArea" class="card"><div class="state" data-mi18n="orders.loading">주문 내역을 불러오는 중…</div></div>
  </div>

  <div id="docModal" class="doc-modal-back" aria-hidden="true">
    <div class="doc-modal" role="dialog" aria-modal="true" aria-labelledby="docModalTitle">
      <div class="doc-modal-head">
        <h3 id="docModalTitle" data-mi18n="orders.docTitle">문서</h3>
        <button type="button" class="doc-modal-x" id="docModalClose" data-mi18n-aria="common.close" aria-label="닫기">×</button>
      </div>
      <div class="doc-modal-body" id="docModalBody"></div>
      <div class="doc-modal-foot">
        <button type="button" class="btn" id="docModalClose2" data-mi18n="common.close">닫기</button>
        <button type="button" class="btn btn-primary" id="docModalPrint" data-mi18n="common.print">인쇄</button>
      </div>
    </div>
  </div>

  <script src="../../assets/js/member-i18n.js"></script>
  <script src="../../assets/js/member.js"></script>
  <script src="../../assets/js/order-doc.js"></script>
  <script>
    document.getElementById("docInlineStyle").textContent = DOC_STYLES;
    mApplyI18n(document);
    mPageTitle("orders.pageTitle");
    document.querySelectorAll("[data-mi18n-aria]").forEach((el) => {
      el.setAttribute("aria-label", mT(el.getAttribute("data-mi18n-aria")));
    });

    let ME = null;
    let SUMMARY = null;
    let modalHtml = "";

    (async function () {
      ME = await memberHeader("orders");
      if (!ME) return;

      const ok = new URLSearchParams(location.search).get("ok");
      if (ok) {
        document.getElementById("okBox").innerHTML =
          `<div class="notice-box success">${mEsc(mT("orders.okBox", { n: ok }))}</div>`;
      }
      bindModal();
      await load();
    })();

    function bindModal() {
      const back = document.getElementById("docModal");
      const close = () => {
        back.classList.remove("open");
        back.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
      };
      document.getElementById("docModalClose").addEventListener("click", close);
      document.getElementById("docModalClose2").addEventListener("click", close);
      back.addEventListener("click", (e) => { if (e.target === back) close(); });
      document.getElementById("docModalPrint").addEventListener("click", () => {
        printDocHtml(modalHtml, document.getElementById("docModalTitle").textContent);
      });
    }

    function openDocModal(title, html) {
      modalHtml = html;
      document.getElementById("docModalTitle").textContent = title;
      document.getElementById("docModalBody").innerHTML = html;
      const back = document.getElementById("docModal");
      back.classList.add("open");
      back.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    async function showOrderDoc(orderId) {
      const data = await mApi("/orders/" + orderId);
      const html = buildOrderDocHtml(data.order, "order");
      openDocModal(mT("orders.docOrder") + " · " + data.order.orderNumber, html);
    }

    async function showAggregateDoc(type) {
      if (!SUMMARY) SUMMARY = await mApi("/orders/mine/summary");
      if (!SUMMARY.orderCount) {
        mToast(mT("orders.noAgg"));
        return;
      }
      const labels = {
        order: mT("orders.docAggOrder"),
        statement: mT("orders.docStatement"),
        tax: mT("orders.docTax"),
      };
      const html = buildAggregateDocHtml(SUMMARY, type);
      openDocModal(labels[type] || mT("orders.docTitle"), html);
    }

    async function load() {
      const area = document.getElementById("ordArea");
      try {
        const [listRes, sumRes] = await Promise.all([
          mApi("/orders/mine"),
          mApi("/orders/mine/summary"),
        ]);
        SUMMARY = sumRes;
        const items = listRes.items;

        if (items.length === 0) {
          area.innerHTML = `<div class="state">${mEsc(mT("orders.empty"))} <a href="/pages/member/shop.html" class="link-gold">${mEsc(mT("orders.goShop"))}</a></div>`;
          return;
        }

        const hasSummary = SUMMARY && SUMMARY.orderCount > 0;
        area.innerHTML = `
          <div class="card-head">${mEsc(mT("orders.listHead"))}</div>
          <div class="card-body flush">
          <table class="tbl">
            <thead><tr>
              <th>${mEsc(mT("orders.colNumber"))}</th>
              <th>${mEsc(mT("orders.colItems"))}</th>
              <th class="right">${mEsc(mT("orders.colTotal"))}</th>
              <th>${mEsc(mT("orders.colStatus"))}</th>
              <th class="nowrap">${mEsc(mT("orders.colDate"))}</th>
              <th class="right">${mEsc(mT("orders.colDoc"))}</th>
            </tr></thead>
            <tbody>${items.map((o) => `
              <tr>
                <td class="nowrap"><b>${mEsc(o.orderNumber)}</b></td>
                <td>${mEsc(o.items[0] ? o.items[0].name : "-")}${o.items.length > 1 ? mEsc(mT("common.moreItems", { n: o.items.length - 1 })) : ""}</td>
                <td class="right nowrap">${won(o.totalAmount)}</td>
                <td><span class="tag ${o.status}">${mEsc(mMemberStatus(o.status))}</span></td>
                <td class="nowrap">${mFmtDay(o.createdAt)}</td>
                <td class="right nowrap">
                  <button type="button" class="btn btn-sm" data-order-id="${mEsc(o.id)}">${mEsc(mT("orders.docOrder"))}</button>
                </td>
              </tr>`).join("")}</tbody>
          </table>
          ${hasSummary ? `
          <div class="doc-actions">
            <p class="doc-actions-lead">${mEsc(mT("orders.docAggLead", { n: SUMMARY.orderCount }))}</p>
            <div class="doc-actions-btns">
              <button type="button" class="btn btn-primary" data-agg="order">${mEsc(mT("orders.docAggOrder"))}</button>
              <button type="button" class="btn" data-agg="statement">${mEsc(mT("orders.docStatement"))}</button>
              <button type="button" class="btn" data-agg="tax">${mEsc(mT("orders.docTax"))}</button>
            </div>
          </div>` : ""}
          </div>`;

        area.querySelectorAll("[data-order-id]").forEach((btn) => {
          btn.addEventListener("click", async () => {
            btn.disabled = true;
            try { await showOrderDoc(btn.getAttribute("data-order-id")); }
            catch (e) { mToast(e.message); }
            finally { btn.disabled = false; }
          });
        });

        area.querySelectorAll("[data-agg]").forEach((btn) => {
          btn.addEventListener("click", async () => {
            btn.disabled = true;
            try { await showAggregateDoc(btn.getAttribute("data-agg")); }
            catch (e) { mToast(e.message); }
            finally { btn.disabled = false; }
          });
        });
      } catch (e) {
        area.innerHTML = `<div class="state">${mEsc(mT("common.errorPrefix"))}${mEsc(e.message)}</div>`;
      }
    }
  </script>
</body>
</html>
