<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>로그인 | 근로복지공단 인천병원 장례식장</title>
  <link rel="stylesheet" href="../../assets/css/member.css" />
</head>
<body>
  <div class="m-login">
    <form class="m-login-card" id="loginForm">
      <h1>로그인</h1>
      <p class="sub">상주(유족)·관리자 통합 로그인입니다.<br />계정에 맞는 화면으로 자동 이동합니다.</p>
      <div class="fld">
        <label for="username">아이디</label>
        <input id="username" type="text" autocomplete="username" required />
      </div>
      <div class="fld">
        <label for="password">비밀번호</label>
        <div class="pw-wrap">
          <input id="password" type="password" autocomplete="current-password" required />
          <button type="button" class="pw-toggle" id="pwToggle" aria-label="비밀번호 표시"></button>
        </div>
      </div>
      <div class="notice-box" id="errBox" style="display:none;color:#c0392b;background:#fdecec;border-color:#f3c9c4"></div>
      <button type="submit" class="btn btn-primary btn-block" id="submitBtn">로그인</button>
      <p class="sub" style="margin-top:18px">
        계정이 없으신가요? 장례식장 상담실(<b>032-205-1100</b>)로 문의해 주세요.<br />
        <a href="/" style="color:var(--gold);font-weight:600">← 홈페이지로 돌아가기</a>
      </p>
    </form>
  </div>

  <script src="../../assets/js/member.js"></script>
  <script>
    function safeNext(raw) {
      if (!raw || typeof raw !== "string") return null;
      if (!raw.startsWith("/") || raw.startsWith("//")) return null;
      if (raw.startsWith("/admin") || raw.startsWith("/pages/member")) return raw;
      return null;
    }

    const nextUrl = safeNext(new URLSearchParams(location.search).get("next"));

    async function fetchCurrentUser() {
      const res = await fetch("/api/auth/me", { credentials: "same-origin" });
      if (!res.ok) return null;
      const d = await res.json();
      return d.user || null;
    }

    function gotoAfterLogin(role) {
      if (nextUrl && role === "admin" && nextUrl.startsWith("/admin")) {
        location.href = nextUrl;
        return;
      }
      if (nextUrl && role === "family" && nextUrl.startsWith("/pages/member")) {
        location.href = nextUrl;
        return;
      }
      if (role === "admin") location.href = "/admin/";
      else location.href = "/pages/member/shop.html";
    }

    (async function () {
      try {
        const me = await fetchCurrentUser();
        if (me) gotoAfterLogin(me.role);
      } catch (e) {}
    })();

    (function () {
      const EYE = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
      const EYE_OFF = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
      const pw = document.getElementById("password");
      const tg = document.getElementById("pwToggle");
      tg.innerHTML = EYE;
      tg.addEventListener("click", function () {
        const show = pw.type === "password";
        pw.type = show ? "text" : "password";
        tg.innerHTML = show ? EYE_OFF : EYE;
        tg.setAttribute("aria-label", show ? "비밀번호 숨김" : "비밀번호 표시");
        pw.focus();
      });
    })();

    const form = document.getElementById("loginForm");
    const errBox = document.getElementById("errBox");
    const btn = document.getElementById("submitBtn");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errBox.style.display = "none";
      btn.disabled = true; btn.textContent = "로그인 중…";
      try {
        const d = await mApi("/auth/login", {
          method: "POST",
          noRedirect: true,
          body: { username: document.getElementById("username").value.trim(), password: document.getElementById("password").value },
        });
        gotoAfterLogin(d.user && d.user.role);
      } catch (err) {
        errBox.textContent = err.message; errBox.style.display = "block";
        btn.disabled = false; btn.textContent = "로그인";
      }
    });
  </script>
</body>
</html>
