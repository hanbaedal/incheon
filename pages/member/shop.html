<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>장례 예약 | 상주 전용 서비스</title>
  <link rel="stylesheet" href="../../assets/css/member.css" />
</head>
<body>
  <header id="mHeader"></header>
  <div class="m-wrap">
    <h1 class="m-title">장례 서비스 예약</h1>
    <p class="m-lead">빈소 선택부터 장례 물품·접객 음식(식사·안주·떡·과일·제사상·식음료·공산품)·화환·영정·상복·운구까지 미리 예약하실 수 있습니다. 식음료·공산품류는 소비 후 발인 전 수기 정산됩니다.</p>

    <div class="reserve-tabs" id="catTabs"></div>

    <div class="shop-grid">
      <div id="mainArea" class="card"><div class="state">불러오는 중…</div></div>
      <div class="card cart">
        <div class="card-head">예약 요약</div>
        <div class="card-body">
          <div id="cartArea"><div class="cart-empty">담긴 항목이 없습니다.</div></div>
          <div id="cartSum"></div>
          <button class="btn btn-gold btn-block" id="orderBtn" style="margin-top:14px" disabled>예약 제출</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../../assets/js/member.js"></script>
  <script>
    let ME = null;
    let PRODUCTS = [];
    let COFFINS = [];
    let HOENGDAES = [];
    let SHROUDS = [];
    let ACCESSORIES = [];
    let FOOD_ITEMS = [];
    let FLOWER_ITEMS = [];
    let PHOTO_ITEMS = [];
    let DRESS_ITEMS = [];
    let HEARSE_ITEMS = [];
    let ACTIVE_FOOD_CAT = "meal";
    let ACTIVE_FLOWER_CAT = "altar";
    let ACTIVE_PHOTO_CAT = "portrait";
    let ACTIVE_DRESS_CAT = "women";
    let ACTIVE_HEARSE_CAT = "cadillac";
    const FOOD_SUB_CATS = [
      { key: "meal", label: "식사류" },
      { key: "anju", label: "안주류" },
      { key: "tteok", label: "떡류" },
      { key: "fruit", label: "과일류" },
      { key: "jesa", label: "제사상" },
      { key: "beverage", label: "식음료류" },
      { key: "consumables", label: "공산품류" },
    ];
    const FLOWER_SUB_CATS = [
      { key: "altar", label: "제단장식" },
      { key: "basket", label: "근조바구니" },
      { key: "wreath", label: "조문용 조화" },
      { key: "chrysanthemum", label: "헌화용 국화" },
      { key: "coffin", label: "관장식" },
      { key: "vehicle", label: "차량장식" },
    ];
    const PHOTO_SUB_CATS = [
      { key: "portrait", label: "영정" },
      { key: "frame", label: "액자" },
      { key: "idphoto", label: "증명사진" },
      { key: "instant", label: "즉석사진" },
    ];
    const DRESS_SUB_CATS = [
      { key: "women", label: "여성예복" },
      { key: "shirt", label: "와이셔츠" },
      { key: "belt", label: "벨트" },
      { key: "socks", label: "양말" },
      { key: "shoes", label: "구두" },
      { key: "tie", label: "넥타이" },
      { key: "undershirt", label: "런닝셔츠" },
    ];
    const HEARSE_SUB_CATS = [
      { key: "cadillac", label: "캐딜락" },
      { key: "limousine", label: "고급리무진" },
    ];
    let ACTIVE_CAT = "hall";
    let HALLS = [];
    let MY_HALL_REQ = null;
    const cart = new Map();

    (async function () {
      ME = await memberHeader("shop");
      if (!ME) return;
      renderTabs();
      try {
        const [prodRes, coffinRes, hoengdaeRes, shroudRes, accessoryRes, foodRes, flowerRes, photoRes, dressRes, hearseRes] = await Promise.all([
          mApi("/products"),
          mApi("/coffins"),
          mApi("/hoengdae"),
          mApi("/shrouds"),
          mApi("/accessories"),
          mApi("/food-items"),
          mApi("/flower-items"),
          mApi("/photo-items"),
          mApi("/dress-items"),
          mApi("/hearse-items"),
        ]);
        PRODUCTS = prodRes.items;
        COFFINS = coffinRes.items;
        HOENGDAES = hoengdaeRes.items;
        SHROUDS = shroudRes.items;
        ACCESSORIES = accessoryRes.items;
        FOOD_ITEMS = foodRes.items;
        FLOWER_ITEMS = flowerRes.items;
        PHOTO_ITEMS = photoRes.items;
        DRESS_ITEMS = dressRes.items;
        HEARSE_ITEMS = hearseRes.items;
        await loadHallData();
        renderMain();
      } catch (e) {
        document.getElementById("mainArea").innerHTML = `<div class="state">오류: ${mEsc(e.message)}</div>`;
      }
      document.getElementById("orderBtn").addEventListener("click", placeOrder);
    })();

    function renderTabs() {
      document.getElementById("catTabs").innerHTML = RESERVE_CATS.map((c) =>
        `<button type="button" class="reserve-tab ${c.key === ACTIVE_CAT ? "active" : ""}" data-cat="${c.key}">${mEsc(c.label)}</button>`
      ).join("");
      document.querySelectorAll(".reserve-tab").forEach((b) =>
        b.addEventListener("click", () => {
          ACTIVE_CAT = b.getAttribute("data-cat");
          if (ACTIVE_CAT === "food") ACTIVE_FOOD_CAT = "meal";
          if (ACTIVE_CAT === "flower") ACTIVE_FLOWER_CAT = "altar";
          if (ACTIVE_CAT === "photo") ACTIVE_PHOTO_CAT = "portrait";
          if (ACTIVE_CAT === "dress") ACTIVE_DRESS_CAT = "women";
          if (ACTIVE_CAT === "hearse") ACTIVE_HEARSE_CAT = "cadillac";
          renderTabs(); renderMain();
        }));
    }

    async function loadHallData() {
      try {
        HALLS = (await mApi("/hall-requests/available")).items;
        const mine = (await mApi("/hall-requests/mine")).items;
        MY_HALL_REQ = mine.find((r) => r.status === "pending") || mine.find((r) => r.status === "approved") || null;
      } catch (e) {
        HALLS = [];
        MY_HALL_REQ = null;
      }
    }

    function cartKey(type, id) { return type + ":" + id; }

    function findCartItem(key) {
      const [type, id] = key.split(":");
      if (type === "coffin") return COFFINS.find((x) => x.id === id);
      if (type === "hoengdae") return HOENGDAES.find((x) => x.id === id);
      if (type === "shroud") return SHROUDS.find((x) => x.id === id);
      if (type === "accessory") return ACCESSORIES.find((x) => x.id === id);
      if (type === "foodItem") return FOOD_ITEMS.find((x) => x.id === id);
      if (type === "flowerItem") return FLOWER_ITEMS.find((x) => x.id === id);
      if (type === "photoItem") return PHOTO_ITEMS.find((x) => x.id === id);
      if (type === "dressItem") return DRESS_ITEMS.find((x) => x.id === id);
      if (type === "hearseItem") return HEARSE_ITEMS.find((x) => x.id === id);
      return PRODUCTS.find((x) => x.id === id);
    }

    function renderMain() {
      const area = document.getElementById("mainArea");
      if (ACTIVE_CAT === "hall") {
        let html = '<div class="card-head">빈소선택</div><div class="card-body">';
        if (ME.hallId) {
          html += `<div class="notice-box">배정된 빈소가 있습니다. 아래 카테고리에서 장례 서비스를 예약해 주세요.</div>`;
        } else if (MY_HALL_REQ) {
          const st = MY_HALL_REQ.status === "pending" ? "승인 대기 중" : (MY_HALL_REQ.status === "approved" ? "승인 완료" : "거절됨");
          html += `<div class="notice-box">신청 빈소: <b>${mEsc((MY_HALL_REQ.hall && MY_HALL_REQ.hall.hallNumber) || "-")}</b> · 상태: ${st}</div>`;
        }
        if (!ME.hallId && (!MY_HALL_REQ || MY_HALL_REQ.status === "rejected")) {
          if (HALLS.length === 0) {
            html += '<div class="state">현재 신청 가능한 빈소가 없습니다.</div>';
          } else {
            html += '<p style="margin:0 0 12px;color:var(--gray);font-size:14px">비어있는 빈소 중 선택하여 신청해 주세요. 관리자 승인 후 배정됩니다.</p>';
            HALLS.forEach((h) => {
              html += `
                <div class="prod">
                  <div class="info"><b>${mEsc(h.hallNumber)}</b><small>현재 비어있음</small></div>
                  <button class="btn btn-sm btn-primary" data-hall="${h.id}">신청</button>
                </div>`;
            });
          }
        }
        html += "</div>";
        area.innerHTML = html;
        area.querySelectorAll("[data-hall]").forEach((b) =>
          b.addEventListener("click", () => requestHall(b.getAttribute("data-hall"))));
        return;
      }

      if (ACTIVE_CAT === "coffin") {
        const cat = RESERVE_CATS.find((c) => c.key === ACTIVE_CAT);
        let html = `<div class="card-head">${mEsc(cat ? cat.label : ACTIVE_CAT)}</div><div class="card-body">`;
        if (COFFINS.length === 0 && HOENGDAES.length === 0) {
          html += '<div class="state">등록된 관·횡대가 없습니다.</div>';
        } else {
          if (COFFINS.length > 0) {
            html += '<h4 style="margin:0 0 10px">관</h4><div class="prod-grid">';
            COFFINS.forEach((c) => {
              html += `
                <div class="prod-card">
                  ${c.imageUrl ? `<img src="${mEsc(c.imageUrl)}" alt="" class="prod-img">` : '<div class="prod-img placeholder">이미지 없음</div>'}
                  <div class="prod-card-body">
                    <b>${mEsc(c.name)}</b>
                    <small>어깨 ${mEsc(c.shoulder || "-")} · 높이 ${c.height != null ? c.height : "-"} · 길이 ${c.length != null ? c.length : "-"}㎜</small>
                    <div class="prod-meta"><span class="price">${won(c.price)} / ${mEsc(c.unit)}</span></div>
                    <button class="btn btn-sm btn-primary" data-add="coffin:${c.id}">담기</button>
                  </div>
                </div>`;
            });
            html += "</div>";
          }
          if (HOENGDAES.length > 0) {
            html += '<h4 style="margin:18px 0 10px">횡대</h4><div class="prod-grid">';
            HOENGDAES.forEach((h) => {
              html += `
                <div class="prod-card">
                  ${h.imageUrl ? `<img src="${mEsc(h.imageUrl)}" alt="" class="prod-img">` : '<div class="prod-img placeholder">이미지 없음</div>'}
                  <div class="prod-card-body">
                    <b>${mEsc(h.name)}</b>
                    <small>세로 ${h.vertical != null ? h.vertical : "-"} · 가로 ${h.horizontal != null ? h.horizontal : "-"} · 두께 ${h.thickness != null ? h.thickness : "-"}㎜</small>
                    <div class="prod-meta"><span class="price">${won(h.price)} / ${mEsc(h.unit)}</span></div>
                    <button class="btn btn-sm btn-primary" data-add="hoengdae:${h.id}">담기</button>
                  </div>
                </div>`;
            });
            html += "</div>";
          }
        }
        html += "</div>";
        area.innerHTML = html;
        area.querySelectorAll("[data-add]").forEach((b) =>
          b.addEventListener("click", () => addToCart(b.getAttribute("data-add"))));
        return;
      }

      if (ACTIVE_CAT === "shroud") {
        const cat = RESERVE_CATS.find((c) => c.key === ACTIVE_CAT);
        let html = `<div class="card-head">${mEsc(cat ? cat.label : ACTIVE_CAT)}</div><div class="card-body">`;
        if (SHROUDS.length === 0) {
          html += '<div class="state">등록된 수의가 없습니다.</div>';
        } else {
          html += '<div class="prod-grid">';
          SHROUDS.forEach((s) => {
            html += `
              <div class="prod-card">
                ${s.imageUrl ? `<img src="${mEsc(s.imageUrl)}" alt="" class="prod-img">` : '<div class="prod-img placeholder">이미지 없음</div>'}
                <div class="prod-card-body">
                  <b>${mEsc(s.name)}</b>
                  <small>${mEsc(s.material || "")}${s.weaveType ? " · " + mEsc(s.weaveType) : ""}</small>
                  <div class="prod-meta"><span class="price">${won(s.price)} / ${mEsc(s.unit)}</span></div>
                  <button class="btn btn-sm btn-primary" data-add="shroud:${s.id}">담기</button>
                </div>
              </div>`;
          });
          html += "</div>";
        }
        html += "</div>";
        area.innerHTML = html;
        area.querySelectorAll("[data-add]").forEach((b) =>
          b.addEventListener("click", () => addToCart(b.getAttribute("data-add"))));
        return;
      }

      if (ACTIVE_CAT === "etc") {
        const cat = RESERVE_CATS.find((c) => c.key === ACTIVE_CAT);
        let html = `<div class="card-head">${mEsc(cat ? cat.label : ACTIVE_CAT)}</div><div class="card-body">`;
        if (ACCESSORIES.length === 0) {
          html += '<div class="state">등록된 부속물품이 없습니다.</div>';
        } else {
          html += '<div class="prod-grid">';
          ACCESSORIES.forEach((a) => {
            html += `
              <div class="prod-card">
                ${a.imageUrl ? `<img src="${mEsc(a.imageUrl)}" alt="" class="prod-img">` : '<div class="prod-img placeholder">이미지 없음</div>'}
                <div class="prod-card-body">
                  <b>${mEsc(a.name)}</b>
                  <small>${mEsc(a.spec || "&nbsp;")}</small>
                  <div class="prod-meta"><span class="price">${won(a.price)} / ${mEsc(a.unit)}</span></div>
                  <button class="btn btn-sm btn-primary" data-add="accessory:${a.id}">담기</button>
                </div>
              </div>`;
          });
          html += "</div>";
        }
        html += "</div>";
        area.innerHTML = html;
        area.querySelectorAll("[data-add]").forEach((b) =>
          b.addEventListener("click", () => addToCart(b.getAttribute("data-add"))));
        return;
      }

      if (ACTIVE_CAT === "food") {
        const items = FOOD_ITEMS.filter((f) => f.foodCategory === ACTIVE_FOOD_CAT);
        const sub = FOOD_SUB_CATS.find((c) => c.key === ACTIVE_FOOD_CAT);
        let html = `<div class="card-head">접객 음식 · ${mEsc(sub ? sub.label : ACTIVE_FOOD_CAT)}</div><div class="card-body">`;
        html += '<div class="reserve-tabs" style="margin-bottom:14px;flex-wrap:wrap">';
        html += FOOD_SUB_CATS.map((c) =>
          `<button type="button" class="reserve-tab ${c.key === ACTIVE_FOOD_CAT ? "active" : ""}" data-fcat="${c.key}">${mEsc(c.label)}</button>`
        ).join("");
        html += "</div>";
        if (items.length === 0) {
          html += '<div class="state">등록된 품목이 없습니다.</div>';
        } else {
          html += '<div class="prod-grid">';
          items.forEach((f) => {
            html += `
              <div class="prod-card">
                ${f.imageUrl ? `<img src="${mEsc(f.imageUrl)}" alt="" class="prod-img">` : '<div class="prod-img placeholder">이미지 없음</div>'}
                <div class="prod-card-body">
                  <b>${mEsc(f.name)}</b>
                  <small>${mEsc(f.subGroup || f.description || "&nbsp;")}</small>
                  <div class="prod-meta">
                    <span class="price">${won(f.price)} / ${mEsc(f.unit)}</span>
                    ${f.settlementType === "postpaid" ? '<span class="tag pending">발인 전 수기 정산</span>' : ""}
                  </div>
                  <button class="btn btn-sm btn-primary" data-add="foodItem:${f.id}">담기</button>
                </div>
              </div>`;
          });
          html += "</div>";
        }
        html += "</div>";
        area.innerHTML = html;
        area.querySelectorAll("[data-fcat]").forEach((b) =>
          b.addEventListener("click", () => { ACTIVE_FOOD_CAT = b.getAttribute("data-fcat"); renderMain(); }));
        area.querySelectorAll("[data-add]").forEach((b) =>
          b.addEventListener("click", () => addToCart(b.getAttribute("data-add"))));
        return;
      }

      if (ACTIVE_CAT === "flower") {
        const items = FLOWER_ITEMS.filter((f) => f.flowerCategory === ACTIVE_FLOWER_CAT);
        const sub = FLOWER_SUB_CATS.find((c) => c.key === ACTIVE_FLOWER_CAT);
        let html = `<div class="card-head">근조 화환 · ${mEsc(sub ? sub.label : ACTIVE_FLOWER_CAT)}</div><div class="card-body">`;
        html += '<div class="reserve-tabs" style="margin-bottom:14px">';
        html += FLOWER_SUB_CATS.map((c) =>
          `<button type="button" class="reserve-tab ${c.key === ACTIVE_FLOWER_CAT ? "active" : ""}" data-flcat="${c.key}">${mEsc(c.label)}</button>`
        ).join("");
        html += "</div>";
        if (items.length === 0) {
          html += '<div class="state">등록된 품목이 없습니다.</div>';
        } else {
          html += '<div class="prod-grid">';
          items.forEach((f) => {
            html += `
              <div class="prod-card">
                ${f.imageUrl ? `<img src="${mEsc(f.imageUrl)}" alt="" class="prod-img">` : '<div class="prod-img placeholder">이미지 없음</div>'}
                <div class="prod-card-body">
                  <b>${mEsc(f.name)}</b>
                  <small>${mEsc(f.description) || "&nbsp;"}</small>
                  <div class="prod-meta"><span class="price">${won(f.price)} / ${mEsc(f.unit)}</span></div>
                  <button class="btn btn-sm btn-primary" data-add="flowerItem:${f.id}">담기</button>
                </div>
              </div>`;
          });
          html += "</div>";
        }
        html += "</div>";
        area.innerHTML = html;
        area.querySelectorAll("[data-flcat]").forEach((b) =>
          b.addEventListener("click", () => { ACTIVE_FLOWER_CAT = b.getAttribute("data-flcat"); renderMain(); }));
        area.querySelectorAll("[data-add]").forEach((b) =>
          b.addEventListener("click", () => addToCart(b.getAttribute("data-add"))));
        return;
      }

      if (ACTIVE_CAT === "photo") {
        const items = PHOTO_ITEMS.filter((p) => p.photoCategory === ACTIVE_PHOTO_CAT);
        const sub = PHOTO_SUB_CATS.find((c) => c.key === ACTIVE_PHOTO_CAT);
        let html = `<div class="card-head">영정 사진 · ${mEsc(sub ? sub.label : ACTIVE_PHOTO_CAT)}</div><div class="card-body">`;
        html += '<div class="reserve-tabs" style="margin-bottom:14px">';
        html += PHOTO_SUB_CATS.map((c) =>
          `<button type="button" class="reserve-tab ${c.key === ACTIVE_PHOTO_CAT ? "active" : ""}" data-phcat="${c.key}">${mEsc(c.label)}</button>`
        ).join("");
        html += "</div>";
        if (items.length === 0) {
          html += '<div class="state">등록된 품목이 없습니다.</div>';
        } else {
          html += '<div class="prod-grid">';
          items.forEach((p) => {
            const label = p.subGroup ? `${p.subGroup} ${p.name}` : p.name;
            html += `
              <div class="prod-card">
                ${p.imageUrl ? `<img src="${mEsc(p.imageUrl)}" alt="" class="prod-img">` : '<div class="prod-img placeholder">이미지 없음</div>'}
                <div class="prod-card-body">
                  <b>${mEsc(label)}</b>
                  <small>${mEsc(p.spec || p.description || "&nbsp;")}</small>
                  <div class="prod-meta"><span class="price">${won(p.price)} / ${mEsc(p.unit)}</span></div>
                  <button class="btn btn-sm btn-primary" data-add="photoItem:${p.id}">담기</button>
                </div>
              </div>`;
          });
          html += "</div>";
        }
        html += "</div>";
        area.innerHTML = html;
        area.querySelectorAll("[data-phcat]").forEach((b) =>
          b.addEventListener("click", () => { ACTIVE_PHOTO_CAT = b.getAttribute("data-phcat"); renderMain(); }));
        area.querySelectorAll("[data-add]").forEach((b) =>
          b.addEventListener("click", () => addToCart(b.getAttribute("data-add"))));
        return;
      }

      if (ACTIVE_CAT === "dress") {
        const items = DRESS_ITEMS.filter((d) => d.dressCategory === ACTIVE_DRESS_CAT);
        const sub = DRESS_SUB_CATS.find((c) => c.key === ACTIVE_DRESS_CAT);
        let html = `<div class="card-head">상복 대여 · ${mEsc(sub ? sub.label : ACTIVE_DRESS_CAT)}</div><div class="card-body">`;
        html += '<div class="reserve-tabs" style="margin-bottom:14px;flex-wrap:wrap">';
        html += DRESS_SUB_CATS.map((c) =>
          `<button type="button" class="reserve-tab ${c.key === ACTIVE_DRESS_CAT ? "active" : ""}" data-drcat="${c.key}">${mEsc(c.label)}</button>`
        ).join("");
        html += "</div>";
        if (items.length === 0) {
          html += '<div class="state">등록된 품목이 없습니다.</div>';
        } else {
          html += '<table class="tbl" style="width:100%"><thead><tr><th>품목</th><th>규격</th><th>수량</th><th>가격</th><th></th></tr></thead><tbody>';
          items.forEach((d) => {
            html += `
              <tr>
                <th>${mEsc(d.name)}</th>
                <td>${mEsc(d.spec || "-")}</td>
                <td>${mEsc(d.unit || "1개")}</td>
                <td class="nowrap">${won(d.price)}</td>
                <td><button class="btn btn-sm btn-primary" data-add="dressItem:${d.id}">담기</button></td>
              </tr>`;
          });
          html += "</tbody></table>";
        }
        html += "</div>";
        area.innerHTML = html;
        area.querySelectorAll("[data-drcat]").forEach((b) =>
          b.addEventListener("click", () => { ACTIVE_DRESS_CAT = b.getAttribute("data-drcat"); renderMain(); }));
        area.querySelectorAll("[data-add]").forEach((b) =>
          b.addEventListener("click", () => addToCart(b.getAttribute("data-add"))));
        return;
      }

      if (ACTIVE_CAT === "hearse") {
        const items = HEARSE_ITEMS.filter((h) => h.hearseCategory === ACTIVE_HEARSE_CAT);
        const sub = HEARSE_SUB_CATS.find((c) => c.key === ACTIVE_HEARSE_CAT);
        let html = `<div class="card-head">운구·차량 · ${mEsc(sub ? sub.label : ACTIVE_HEARSE_CAT)}</div><div class="card-body">`;
        html += '<div class="reserve-tabs" style="margin-bottom:14px">';
        html += HEARSE_SUB_CATS.map((c) =>
          `<button type="button" class="reserve-tab ${c.key === ACTIVE_HEARSE_CAT ? "active" : ""}" data-hrcat="${c.key}">${mEsc(c.label)}</button>`
        ).join("");
        html += "</div>";
        if (items.length === 0) {
          html += '<div class="state">등록된 차량이 없습니다.</div>';
        } else {
          html += '<table class="tbl" style="width:100%"><thead><tr><th>차량</th><th>규격</th><th>수량</th><th>가격</th><th></th></tr></thead><tbody>';
          items.forEach((h) => {
            html += `
              <tr>
                <th>${mEsc(h.name)}</th>
                <td>${mEsc(h.spec || "-")}</td>
                <td>${mEsc(h.unit || "1대")}</td>
                <td class="nowrap">${won(h.price)}</td>
                <td><button class="btn btn-sm btn-primary" data-add="hearseItem:${h.id}">담기</button></td>
              </tr>`;
          });
          html += "</tbody></table>";
        }
        html += "</div>";
        area.innerHTML = html;
        area.querySelectorAll("[data-hrcat]").forEach((b) =>
          b.addEventListener("click", () => { ACTIVE_HEARSE_CAT = b.getAttribute("data-hrcat"); renderMain(); }));
        area.querySelectorAll("[data-add]").forEach((b) =>
          b.addEventListener("click", () => addToCart(b.getAttribute("data-add"))));
        return;
      }

      const items = PRODUCTS.filter((p) => p.catKey === ACTIVE_CAT);
      const cat = RESERVE_CATS.find((c) => c.key === ACTIVE_CAT);
      let html = `<div class="card-head">${mEsc(cat ? cat.label : ACTIVE_CAT)}</div><div class="card-body">`;
      if (items.length === 0) {
        html += '<div class="state">등록된 상품이 없습니다.</div>';
      } else {
        html += '<div class="prod-grid">';
        items.forEach((p) => {
          html += `
            <div class="prod-card">
              ${p.imageUrl ? `<img src="${mEsc(p.imageUrl)}" alt="" class="prod-img">` : '<div class="prod-img placeholder">이미지 없음</div>'}
              <div class="prod-card-body">
                <b>${mEsc(p.name)}</b>
                <small>${mEsc(p.description) || "&nbsp;"}</small>
                <div class="prod-meta">
                  <span class="price">${won(p.price)} / ${mEsc(p.unit)}</span>
                  ${p.settlementType === "postpaid" ? '<span class="tag pending">발인 전 수기 정산</span>' : ""}
                </div>
                <button class="btn btn-sm btn-primary" data-add="product:${p.id}">담기</button>
              </div>
            </div>`;
        });
        html += "</div>";
      }
      html += "</div>";
      area.innerHTML = html;
      area.querySelectorAll("[data-add]").forEach((b) =>
        b.addEventListener("click", () => addToCart(b.getAttribute("data-add"))));
    }

    async function requestHall(hallId) {
      if (!confirm("선택한 빈소를 신청하시겠습니까?")) return;
      try {
        await mApi("/hall-requests", { method: "POST", body: { hallId } });
        mToast("빈소 신청이 접수되었습니다.");
        await loadHallData();
        renderMain();
      } catch (e) { mToast(e.message); }
    }

    function addToCart(key) {
      cart.set(key, (cart.get(key) || 0) + 1);
      renderCart(); mToast("예약 목록에 담았습니다.");
    }
    function setQty(key, qty) {
      if (qty <= 0) cart.delete(key); else cart.set(key, qty);
      renderCart();
    }

    function renderCart() {
      const area = document.getElementById("cartArea");
      const sumArea = document.getElementById("cartSum");
      const btn = document.getElementById("orderBtn");
      if (cart.size === 0) {
        area.innerHTML = '<div class="cart-empty">담긴 항목이 없습니다.</div>';
        sumArea.innerHTML = ""; btn.disabled = true; return;
      }
      let supply = 0, vat = 0, html = "";
      cart.forEach((qty, key) => {
        const p = findCartItem(key);
        if (!p) return;
        const isPostpaid = p.settlementType === "postpaid";
        const line = isPostpaid ? 0 : p.price * qty;
        supply += line;
        if (!isPostpaid && p.taxable !== false) vat += Math.round(line * 0.1);
        html += `
          <div class="cart-item">
            <span class="nm">${mEsc(p.name)}${isPostpaid ? '<br><small style="color:#b8860b">발인 전 정산</small>' : ""}<br><span class="rm" data-rm="${key}">삭제</span></span>
            <span class="qtybox">
              <button data-minus="${key}">−</button><span>${qty}</span><button data-plus="${key}">+</button>
            </span>
            <span class="nowrap" style="min-width:78px;text-align:right">${isPostpaid ? "정산" : won(line)}</span>
          </div>`;
      });
      area.innerHTML = html;
      sumArea.innerHTML = `
        <div class="cart-sum">
          <div class="row"><span>선결제 공급가액</span><span>${won(supply)}</span></div>
          <div class="row"><span>선결제 부가세</span><span>${won(vat)}</span></div>
          <div class="row total"><span>선결제 합계</span><span>${won(supply + vat)}</span></div>
          <p style="font-size:12px;color:var(--gray);margin:8px 0 0">* 생수·음료수·주류 등 사후정산 품목은 발인 전 수기 정산됩니다.</p>
        </div>`;
      btn.disabled = false;
      area.querySelectorAll("[data-plus]").forEach((b) => b.addEventListener("click", () => setQty(b.getAttribute("data-plus"), (cart.get(b.getAttribute("data-plus")) || 0) + 1)));
      area.querySelectorAll("[data-minus]").forEach((b) => b.addEventListener("click", () => setQty(b.getAttribute("data-minus"), (cart.get(b.getAttribute("data-minus")) || 0) - 1)));
      area.querySelectorAll("[data-rm]").forEach((b) => b.addEventListener("click", () => setQty(b.getAttribute("data-rm"), 0)));
    }

    async function placeOrder() {
      if (cart.size === 0) return;
      const items = Array.from(cart.entries()).map(([key, qty]) => {
        const [type, id] = key.split(":");
        if (type === "coffin") return { itemType: "coffin", itemRefId: id, qty };
        if (type === "hoengdae") return { itemType: "hoengdae", itemRefId: id, qty };
        if (type === "shroud") return { itemType: "shroud", itemRefId: id, qty };
        if (type === "accessory") return { itemType: "accessory", itemRefId: id, qty };
        if (type === "foodItem") return { itemType: "foodItem", itemRefId: id, qty };
        if (type === "flowerItem") return { itemType: "flowerItem", itemRefId: id, qty };
        if (type === "photoItem") return { itemType: "photoItem", itemRefId: id, qty };
        if (type === "dressItem") return { itemType: "dressItem", itemRefId: id, qty };
        if (type === "hearseItem") return { itemType: "hearseItem", itemRefId: id, qty };
        return { itemType: "product", productId: id, qty };
      });
      const memo = prompt("요청 사항이 있으면 입력해 주세요. (선택)", "") || "";
      const btn = document.getElementById("orderBtn");
      btn.disabled = true; btn.textContent = "예약 처리 중…";
      try {
        const d = await mApi("/orders", { method: "POST", body: { items, memo } });
        mToast("예약이 접수되었습니다.");
        location.href = "/pages/member/orders.html?ok=" + encodeURIComponent(d.order.orderNumber);
      } catch (e) {
        mToast(e.message);
        btn.disabled = false; btn.textContent = "예약 제출";
      }
    }
  </script>
</body>
</html>
