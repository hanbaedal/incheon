<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title data-mi18n="shop.pageTitle">장례 예약 | 상주 전용 서비스</title>
  <link rel="stylesheet" href="../../assets/css/member.css" />
</head>
<body>
  <header id="mHeader"></header>
  <div class="m-wrap">
    <h1 class="m-title" data-mi18n="shop.title">장례 서비스 예약</h1>
    <p class="m-lead" data-mi18n="shop.lead">빈소 선택부터 장례 물품·접객 음식·화환·영정·상복·운구까지 미리 예약하실 수 있습니다. 빈소를 선택하면 고인·발인 정보 입력 창이 열립니다. 식음료·공산품류는 소비 후 발인 전 수기 정산됩니다.</p>

    <div class="reserve-tabs" id="catTabs"></div>

    <div class="shop-grid">
      <div id="mainArea" class="card"><div class="state" data-mi18n="common.loading">불러오는 중…</div></div>
      <div class="shop-side">
        <div class="card cart">
          <div class="card-head card-head-split" id="cartHead">
            <span data-mi18n="shop.cartSummary">예약 요약</span>
            <span class="cart-hall-name" id="cartHallName"></span>
          </div>
          <div class="card-body">
            <div id="cartArea"><div class="cart-empty" data-mi18n="shop.cartEmpty">담긴 항목이 없습니다.</div></div>
            <div id="cartSum"></div>
            <button class="btn btn-gold btn-block order-btn-wrap" id="orderBtn" disabled data-mi18n="shop.submitOrder">예약 제출</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../../assets/js/member-i18n.js"></script>
  <script src="../../assets/js/member.js"></script>
  <script>
    let ME = null;
    let PRODUCTS = [];
    let COFFINS = [];
    let HOENGDAES = [];
    let SHROUDS = [];
    let ACCESSORIES = [];
    let FOOD_ITEMS = [];
    let FLOWER_ITEMS = [];
    let PHOTO_ITEMS = [];
    let DRESS_ITEMS = [];
    let HEARSE_ITEMS = [];
    let SERVICE_PRICES = [];
    let FACILITY_FEES = [];
    let ACTIVE_FOOD_CAT = "meal";
    let ACTIVE_FLOWER_CAT = "altar";
    let ACTIVE_PHOTO_CAT = "portrait";
    let ACTIVE_HEARSE_CAT = "cadillac";
    const FOOD_SUB_CATS = mFoodSubCats();
    const FLOWER_SUB_CATS = mFlowerSubCats();
    const PHOTO_SUB_CATS = mPhotoSubCats();
    const HEARSE_SUB_CATS = mHearseSubCats();
    let ACTIVE_CAT = "hall";
    let HALLS = [];
    let HALL_SUMMARY = null;
    let MY_HALL_REQ = null;
    let MY_USAGE = null;
    let SELECTED_HALL_ID = "";
    let SELECTED_FUNERAL_DAYS = 3;
    let FUNERAL_DAY_OPTIONS = DEFAULT_FUNERAL_DAY_OPTIONS;
    const cart = new Map();

    (async function () {
      const urlCat = new URLSearchParams(location.search).get("cat");
      if (urlCat === "hall") ACTIVE_CAT = "hall";
      else if (urlCat === "service") ACTIVE_CAT = "service";
      ME = await memberHeader("shop");
      if (!ME) return;
      mApplyI18n(document);
      mPageTitle("shop.pageTitle");
      renderTabs();
      try {
        const [prodRes, coffinRes, hoengdaeRes, shroudRes, accessoryRes, foodRes, flowerRes, photoRes, dressRes, hearseRes, serviceRes, facilityRes] = await Promise.all([
          mApi("/products"),
          mApi("/coffins"),
          mApi("/hoengdae"),
          mApi("/shrouds"),
          mApi("/accessories"),
          mApi("/food-items"),
          mApi("/flower-items"),
          mApi("/photo-items"),
          mApi("/dress-items"),
          mApi("/hearse-items"),
          mApi("/service-prices?orderable=1"),
          mApi("/hall-facility-fees?orderable=1"),
        ]);
        PRODUCTS = prodRes.items;
        COFFINS = coffinRes.items;
        HOENGDAES = hoengdaeRes.items;
        SHROUDS = shroudRes.items;
        ACCESSORIES = accessoryRes.items;
        FOOD_ITEMS = foodRes.items;
        FLOWER_ITEMS = flowerRes.items;
        PHOTO_ITEMS = photoRes.items;
        DRESS_ITEMS = dressRes.items;
        HEARSE_ITEMS = hearseRes.items;
        SERVICE_PRICES = serviceRes.items;
        FACILITY_FEES = facilityRes.items;
        await loadHallData();
        syncAutoFacilityFees();
        renderMain();
        renderCart();
      } catch (e) {
        document.getElementById("mainArea").innerHTML = `<div class="state">${mEsc(mT("common.errorPrefix"))}${mEsc(e.message)}</div>`;
      }
      document.getElementById("orderBtn").addEventListener("click", placeOrder);
    })();

    function renderTabs() {
      document.getElementById("catTabs").innerHTML = RESERVE_CATS.map((c) =>
        `<button type="button" class="reserve-tab ${c.key === ACTIVE_CAT ? "active" : ""}" data-cat="${c.key}">${mEsc(c.label)}</button>`
      ).join("");
      document.querySelectorAll(".reserve-tab").forEach((b) =>
        b.addEventListener("click", () => {
          ACTIVE_CAT = b.getAttribute("data-cat");
          if (ACTIVE_CAT === "food") ACTIVE_FOOD_CAT = "meal";
          if (ACTIVE_CAT === "flower") ACTIVE_FLOWER_CAT = "altar";
          if (ACTIVE_CAT === "photo") ACTIVE_PHOTO_CAT = "portrait";
          if (ACTIVE_CAT === "hearse") ACTIVE_HEARSE_CAT = "cadillac";
          renderTabs(); renderMain();
        }));
    }

    async function loadHallData() {
      try {
        const [avail, mine, usageRes, meRes] = await Promise.all([
          mApi("/hall-requests/available"),
          mApi("/hall-requests/mine"),
          mApi("/hall-usages/mine"),
          mApi("/auth/me"),
        ]);
        ME = meRes.user;
        HALLS = avail.items || [];
        HALL_SUMMARY = avail;
        MY_USAGE = usageRes.usage || null;
        FUNERAL_DAY_OPTIONS = avail.funeralDayOptions || DEFAULT_FUNERAL_DAY_OPTIONS;
        MY_HALL_REQ = mine.items.find((r) => r.status === "pending")
          || mine.items.find((r) => r.status === "approved")
          || null;
        if (MY_HALL_REQ && MY_HALL_REQ.hall) {
          SELECTED_HALL_ID = MY_HALL_REQ.hall.id;
          SELECTED_FUNERAL_DAYS = MY_HALL_REQ.funeralDays || 3;
        }
        if (MY_USAGE && MY_USAGE.hall) {
          SELECTED_HALL_ID = MY_USAGE.hall.id;
          SELECTED_FUNERAL_DAYS = MY_USAGE.funeralDays || SELECTED_FUNERAL_DAYS || 3;
        }
      } catch (e) {
        HALLS = [];
        HALL_SUMMARY = null;
        MY_HALL_REQ = null;
        MY_USAGE = null;
      }
    }

    function getHallDisplayName() {
      if (MY_USAGE && MY_USAGE.status === "active" && MY_USAGE.hall) {
        const h = MY_USAGE.hall;
        return h.name + (h.specLabel ? " (" + h.specLabel + ")" : "");
      }
      if (MY_HALL_REQ && MY_HALL_REQ.hall) {
        const h = MY_HALL_REQ.hall;
        const name = h.name || h.hallNumber || "";
        return name + (h.specLabel ? " (" + h.specLabel + ")" : "");
      }
      return "";
    }

    function updateCartHead() {
      const el = document.getElementById("cartHallName");
      if (el) el.textContent = getHallDisplayName();
    }

    function resolveHallFee(data) {
      if (!data || !data.hall || data.hall.isVirtual) return null;
      const days = data.funeralDays || 3;
      const dailyPrice = data.dailyPrice || data.hall.dailyPrice || 0;
      const hallFeeAmount = data.hallFeeAmount || (dailyPrice * days);
      if (!hallFeeAmount) return null;
      return {
        funeralDays: days,
        dailyPrice,
        hallFeeAmount,
        hallFeeOrdered: !!data.hallFeeOrdered,
      };
    }

    function getPendingHallFee() {
      if (MY_USAGE && MY_USAGE.status === "active") {
        const fee = resolveHallFee(MY_USAGE);
        if (fee && !fee.hallFeeOrdered) return fee;
      }
      if (MY_HALL_REQ && MY_HALL_REQ.status === "pending") {
        const fee = resolveHallFee(MY_HALL_REQ);
        if (fee && fee.hallFeeAmount > 0) return fee;
      }
      return null;
    }

    function hallCartItemHtml() {
      const hallName = getHallDisplayName();
      let fee = null;
      let reserved = false;

      if (MY_USAGE && MY_USAGE.status === "active") {
        fee = resolveHallFee(MY_USAGE);
        if (!fee) return "";
        reserved = !!fee.hallFeeOrdered;
      } else if (MY_HALL_REQ && MY_HALL_REQ.status === "pending") {
        fee = resolveHallFee(MY_HALL_REQ);
        if (!fee) return "";
      } else {
        return "";
      }

      const label = mT("shop.hallLabel") + (hallName || "—");
      const qty = fee.funeralDays;
      const priceText = reserved ? mEsc(mT("common.reserved")) : won(fee.hallFeeAmount);
      const key = "hall:fee";

      return `
        <div class="cart-item">
          <span class="nm">${mEsc(label)}<br><span class="rm" data-rm="${key}">${mEsc(mT("common.delete"))}</span></span>
          <span class="qtybox">
            <button data-minus="${key}">−</button><span>${qty}</span><button data-plus="${key}">+</button>
          </span>
          <span class="nowrap" style="min-width:78px;text-align:right">${priceText}</span>
        </div>`;
    }

    function cartKey(type, id) { return type + ":" + id; }

    function findCartItem(key) {
      const [type, id] = key.split(":");
      if (type === "coffin") return COFFINS.find((x) => x.id === id);
      if (type === "hoengdae") return HOENGDAES.find((x) => x.id === id);
      if (type === "shroud") return SHROUDS.find((x) => x.id === id);
      if (type === "accessory") return ACCESSORIES.find((x) => x.id === id);
      if (type === "foodItem") return FOOD_ITEMS.find((x) => x.id === id);
      if (type === "flowerItem") return FLOWER_ITEMS.find((x) => x.id === id);
      if (type === "photoItem") return PHOTO_ITEMS.find((x) => x.id === id);
      if (type === "dressItem") return DRESS_ITEMS.find((x) => x.id === id);
      if (type === "hearseItem") return HEARSE_ITEMS.find((x) => x.id === id);
      if (type === "servicePrice") return SERVICE_PRICES.find((x) => x.id === id);
      if (type === "hallFacilityFee") return FACILITY_FEES.find((x) => x.id === id);
      return PRODUCTS.find((x) => x.id === id);
    }

    function servicePriceLabel(p) {
      if (!p) return "";
      return p.group && p.group !== p.name ? p.group + " · " + p.name : p.name;
    }

    function itemDisplayLabel(p, cartType) {
      if (cartType === "servicePrice") return servicePriceLabel(p);
      if (cartType === "hallFacilityFee") return p.group && p.name && p.name !== "-" ? p.group + " · " + p.name : p.group;
      return p.spec ? p.name + " " + p.spec : p.name;
    }

    function selectedHall() {
      return HALLS.find((h) => String(h.id) === String(SELECTED_HALL_ID)) || null;
    }

    function hallSummaryNotice() {
      if (!HALL_SUMMARY || !HALL_SUMMARY.activePhysicalCount) return "";
      let t = `<div class="notice-box">${mT("hall.roomSummary", { used: HALL_SUMMARY.activePhysicalCount, cap: HALL_SUMMARY.capacity })}`;
      if (HALL_SUMMARY.freePhysicalSlots > 0) t += mT("hall.roomFree", { n: HALL_SUMMARY.freePhysicalSlots });
      else if (HALL_SUMMARY.nextAvailableLabel) t += ` · ${mEsc(HALL_SUMMARY.nextAvailableLabel)}`;
      return t + "</div>";
    }

    function hallPickListHtml() {
      if (!HALLS.length) return `<div class="state">${mEsc(mT("hall.noAvailable"))}</div>`;
      return `<div class="hall-grid">${HALLS.map((h) => {
        const can = h.canRequestNow !== false;
        const sel = String(h.id) === String(SELECTED_HALL_ID) ? " selected" : "";
        const dis = can ? "" : " disabled";
        const spec = h.specLabel ? `<small>${mEsc(h.specLabel)}</small>` : "";
        return `
          <div class="hall-pick${sel}${dis}" data-pick="${h.id}" data-can="${can ? "1" : "0"}">
            <div class="info">
              <b>${mEsc(h.name || h.hallNumber)}</b>
              ${spec}
              <small>${mEsc(h.areaLabel || "")}${h.capacity ? " · " + mEsc(h.capacity) : ""}${!h.isVirtual && h.dailyPrice ? " · " + mEsc(mT("hall.perDay")) + " " + won(h.dailyPrice) : ""}</small>
              <small>${mEsc(h.feature || "")}</small>
              ${h.availableLabel ? `<small class="${can ? "avail-ok" : "avail-wait"}">${mEsc(h.availableLabel)}</small>` : ""}
            </div>
          </div>`;
      }).join("")}</div>`;
    }

    function activeHallForFees() {
      if (MY_USAGE && MY_USAGE.hall) return MY_USAGE.hall;
      if (MY_HALL_REQ && MY_HALL_REQ.hall) return MY_HALL_REQ.hall;
      return selectedHall();
    }

    function shouldAutoFacilityFees() {
      const hall = activeHallForFees();
      return !!(hall && !hall.isVirtual);
    }

    function facilityFeeQty() {
      if (!shouldAutoFacilityFees()) return 0;
      return Math.max(1, SELECTED_FUNERAL_DAYS || (MY_USAGE && MY_USAGE.funeralDays) || (MY_HALL_REQ && MY_HALL_REQ.funeralDays) || 1);
    }

    function autoFacilityFeeKeys() {
      return (FACILITY_FEES || []).filter((f) => f.orderable !== false).map((f) => "hallFacilityFee:" + f.id);
    }

    function clearAutoFacilityFees() {
      autoFacilityFeeKeys().forEach((k) => cart.delete(k));
    }

    function syncAutoFacilityFees(hall) {
      hall = hall || activeHallForFees();
      clearAutoFacilityFees();
      const qty = hall && !hall.isVirtual
        ? Math.max(1, SELECTED_FUNERAL_DAYS || (MY_USAGE && MY_USAGE.funeralDays) || (MY_HALL_REQ && MY_HALL_REQ.funeralDays) || 1)
        : 0;
      if (!qty) {
        renderCart();
        return;
      }
      FACILITY_FEES.forEach((f) => {
        if (f.orderable !== false) cart.set("hallFacilityFee:" + f.id, qty);
      });
      renderCart();
    }

    function facilityFeesPreviewHtml() {
      if (!shouldAutoFacilityFees() || !FACILITY_FEES.length) return "";
      const qty = facilityFeeQty();
      let rows = FACILITY_FEES.map((f) => {
        const label = f.name && f.name !== "-" ? f.group + " · " + f.name : f.group;
        return `<tr><th>${mEsc(label)}</th><td>${qty}${mEsc(f.unit || "1일")}</td><td class="nowrap">${won(f.price * qty)}</td></tr>`;
      }).join("");
      return `
        <h4 class="section-h4 spaced">${mEsc(mT("prod.facilityHead"))}</h4>
        <p class="note" style="margin-top:0">${mEsc(mT("shop.facilityAutoHint"))}</p>
        <table class="tbl full"><thead><tr><th>${mEsc(mT("prod.colItem"))}</th><th>${mEsc(mT("prod.colQty"))}</th><th>${mEsc(mT("prod.colPrice"))}</th></tr></thead><tbody>${rows}</tbody></table>`;
    }

    function bindHallPick(onPick) {
      document.querySelectorAll("[data-pick]").forEach((el) => {
        el.addEventListener("click", () => {
          if (el.getAttribute("data-can") !== "1") return;
          SELECTED_HALL_ID = el.getAttribute("data-pick");
          document.querySelectorAll("[data-pick]").forEach((x) => x.classList.remove("selected"));
          el.classList.add("selected");
          const hall = selectedHall();
          if (hall && hall.isVirtual) SELECTED_FUNERAL_DAYS = null;
          else if (!SELECTED_FUNERAL_DAYS) SELECTED_FUNERAL_DAYS = 3;
          syncAutoFacilityFees(hall);
          if (onPick) onPick();
        });
      });
    }

    function bindModalFuneralDays(hall) {
      document.querySelectorAll("#mModalDayGrid [data-days]").forEach((el) => {
        el.addEventListener("click", () => {
          SELECTED_FUNERAL_DAYS = Number(el.getAttribute("data-days"));
          document.querySelectorAll("#mModalDayGrid [data-days]").forEach((x) => x.classList.remove("selected"));
          el.classList.add("selected");
          const box = document.getElementById("mModalPriceBox");
          if (box) box.innerHTML = mHallPriceBoxHtml(hall, SELECTED_FUNERAL_DAYS);
          syncAutoFacilityFees(hall);
        });
      });
    }

    function hallInfoFormData(mode) {
      if (mode === "usage" && MY_USAGE) return { ...MY_USAGE };
      if (mode === "pending" && MY_HALL_REQ) return { ...MY_HALL_REQ };
      return { chiefMourner: ME && ME.name ? ME.name : "" };
    }

    function modalHallRef(mode) {
      if (mode === "usage" && MY_USAGE && MY_USAGE.hall) return MY_USAGE.hall;
      if (mode === "pending" && MY_HALL_REQ && MY_HALL_REQ.hall) return MY_HALL_REQ.hall;
      return selectedHall();
    }

    async function saveHallInfo(mode, prefix, btn) {
      const hall = modalHallRef(mode);
      if (mode !== "usage" && hall && !hall.isVirtual && !SELECTED_FUNERAL_DAYS) {
        mToast(mT("hall.selectDays"));
        return false;
      }
      const body = mHallFormValues(prefix);
      if (!body.deceasedName || !body.funeralDate) {
        mToast(mT("hall.needDeceased"));
        return false;
      }
      btn.disabled = true;
      try {
        if (mode === "new") {
          await mApi("/hall-requests", {
            method: "POST",
            body: {
              hallId: SELECTED_HALL_ID,
              funeralDays: hall && hall.isVirtual ? null : SELECTED_FUNERAL_DAYS,
              ...body,
            },
          });
          mToast(mT("hall.reqOk"));
        } else if (mode === "pending") {
          const patch = { ...body };
          if (SELECTED_HALL_ID) patch.hallId = SELECTED_HALL_ID;
          if (hall && !hall.isVirtual) patch.funeralDays = SELECTED_FUNERAL_DAYS;
          await mApi("/hall-requests/mine", { method: "PATCH", body: patch });
          mToast(mT("hall.saveOk"));
        } else {
          await mApi("/hall-usages/mine", { method: "PATCH", body });
          mToast(mT("hall.usageOk"));
        }
        await loadHallData();
        syncAutoFacilityFees();
        renderMain();
        renderCart();
        return true;
      } catch (e) {
        mToast(e.message);
        btn.disabled = false;
        return false;
      }
    }

    function openHallInfoModal(mode) {
      mode = mode || "new";
      if (mode === "new" && !SELECTED_HALL_ID) {
        mToast(mT("hall.selectFirst"));
        return;
      }
      const hall = modalHallRef(mode);
      const hallName = hall ? (hall.name || hall.hallNumber || "-") : "-";
      const formPrefix = "hm";
      const data = hallInfoFormData(mode);
      if (mode === "usage" && MY_USAGE) SELECTED_FUNERAL_DAYS = MY_USAGE.funeralDays || SELECTED_FUNERAL_DAYS;
      const showDays = hall && !hall.isVirtual && mode !== "usage";
      const bodyHtml = `
        ${mode !== "usage" && hall ? `<p class="hall-assigned"><b>${mEsc(hallName)}</b>${hall.specLabel ? " · " + mEsc(hall.specLabel) : ""}</p>` : ""}
        ${showDays ? mHallFuneralDaysPickerHtml(FUNERAL_DAY_OPTIONS, SELECTED_FUNERAL_DAYS, hall) : (hall && hall.isVirtual ? mHallPriceBoxHtml(hall, null) : "")}
        <h4 class="section-h4 ${showDays ? "spaced" : ""}">${mEsc(mT("hall.requiredInfo"))}</h4>
        <div class="m-form">${mHallUsageFormHtml(formPrefix, data)}</div>`;

      mMemberModal.open({
        title: mode === "usage" ? mT("hall.modalUsage") : (mode === "pending" ? mT("hall.modalPending") : mT("hall.modalNew")),
        subtitle: mT("hall.modalSub", { name: hallName }),
        bodyHtml,
        buttons: [
          { label: mT("common.cancel") },
          {
            label: mode === "new" ? mT("hall.apply") : mT("common.save"),
            cls: "btn btn-primary",
            onClick: (btn) => saveHallInfo(mode, formPrefix, btn),
          },
        ],
        onOpen: () => {
          if (showDays && hall) bindModalFuneralDays(hall);
        },
      });
    }

    function renderHallTab() {
      const area = document.getElementById("mainArea");
      if (MY_USAGE && MY_USAGE.status === "active") {
        const h = MY_USAGE.hall;
        const hallName = h ? h.name : "-";
        const sub = [
          MY_USAGE.deceasedName ? mT("common.deceasedPrefix") + MY_USAGE.deceasedName : "",
          MY_USAGE.enshrinedAt ? mT("common.enshrinePrefix") + MY_USAGE.enshrinedAt : "",
          MY_USAGE.funeralDate ? mT("common.funeralPrefix") + MY_USAGE.funeralDate + (MY_USAGE.funeralTime ? " " + MY_USAGE.funeralTime : "") : "",
        ].filter(Boolean).join(" · ");
        area.innerHTML = `
          <div class="card-head">${mEsc(mT("hall.assignedTitle"))}</div>
          <div class="card-body">
            <div class="notice-box success">${mEsc(MY_USAGE.scheduleLocked ? mT("hall.lockedNotice") : mT("hall.activeNotice"))}</div>
            <p class="hall-assigned"><b>${mEsc(hallName)}</b>${h && h.specLabel ? " · " + mEsc(h.specLabel) : ""}${h && h.feature ? " · " + mEsc(h.feature) : ""}</p>
            ${sub ? `<p class="muted" style="margin:0 0 14px">${mEsc(sub)}</p>` : ""}
            ${h && !h.isVirtual && MY_USAGE.funeralDays ? mHallPriceBoxHtml({ ...h, dailyPrice: MY_USAGE.dailyPrice }, MY_USAGE.funeralDays) : ""}
            ${facilityFeesPreviewHtml()}
            <div class="m-actions">
              <button type="button" class="btn btn-primary" id="editUsageBtn">${mEsc(mT("hall.editUsage"))}</button>
            </div>
          </div>`;
        document.getElementById("editUsageBtn").addEventListener("click", () => openHallInfoModal("usage"));
        return;
      }

      if (MY_HALL_REQ && MY_HALL_REQ.status === "pending") {
        SELECTED_HALL_ID = MY_HALL_REQ.hall ? MY_HALL_REQ.hall.id : SELECTED_HALL_ID;
        SELECTED_FUNERAL_DAYS = MY_HALL_REQ.funeralDays || SELECTED_FUNERAL_DAYS || 3;
        area.innerHTML = `
          <div class="card-head">${mEsc(mT("hall.pendingTitle"))}</div>
          <div class="card-body">
            <div class="notice-box">${mEsc(mT("hall.pendingNotice"))}</div>
            ${hallSummaryNotice()}
            ${hallPickListHtml()}
            ${facilityFeesPreviewHtml()}
            <div class="m-actions top-gap">
              <button type="button" class="btn btn-primary" id="editPendingBtn">${mEsc(mT("hall.editPending"))}</button>
            </div>
          </div>`;
        bindHallPick(() => openHallInfoModal("pending"));
        document.getElementById("editPendingBtn").addEventListener("click", () => openHallInfoModal("pending"));
        return;
      }

      area.innerHTML = `
        <div class="card-head">${mEsc(mT("hall.selectTitle"))}</div>
        <div class="card-body">
          <div class="notice-box">${mEsc(mT("hall.pickNotice"))}</div>
          ${hallSummaryNotice()}
          ${hallPickListHtml()}
          ${facilityFeesPreviewHtml()}
        </div>`;
      bindHallPick(() => openHallInfoModal("new"));
    }

    function renderMain() {
      const area = document.getElementById("mainArea");
      if (ACTIVE_CAT === "hall") {
        renderHallTab();
        return;
      }

      if (ACTIVE_CAT === "coffin") {

    function addToCart(key) {
      cart.set(key, (cart.get(key) || 0) + 1);
      renderCart(); mToast(mT("shop.addedToast"));
    }
    function setQty(key, qty) {
      if (key === "hall:fee") {
        mToast(mT("shop.hallFeeLocked"));
        return;
      }
      if (qty <= 0 && key.startsWith("hallFacilityFee:") && shouldAutoFacilityFees()) {
        mToast(mT("shop.facilityAutoHint"));
        return;
      }
      if (key.startsWith("hallFacilityFee:") && shouldAutoFacilityFees()) {
        qty = facilityFeeQty();
      }
      if (qty <= 0) cart.delete(key); else cart.set(key, qty);
      renderCart();
    }

    function renderCart() {
      updateCartHead();
      const area = document.getElementById("cartArea");
      const sumArea = document.getElementById("cartSum");
      const btn = document.getElementById("orderBtn");
      const hallHtml = hallCartItemHtml();
      const pendingHall = getPendingHallFee();

      if (cart.size === 0 && !hallHtml) {
        area.innerHTML = `<div class="cart-empty">${mEsc(mT("shop.cartEmpty"))}</div>`;
        sumArea.innerHTML = "";
        btn.disabled = true;
        return;
      }

      let supply = 0, vat = 0, html = hallHtml;
      if (pendingHall) {
        supply += pendingHall.hallFeeAmount;
        vat += Math.round(pendingHall.hallFeeAmount * 0.1);
      }

      if (cart.size === 0) {
        html += `<div class="cart-empty compact">${mEsc(mT("shop.cartEmptyHint"))}</div>`;
      } else {
        cart.forEach((qty, key) => {
          const p = findCartItem(key);
          if (!p) return;
          const [cartType] = key.split(":");
          const isPostpaid = p.settlementType === "postpaid";
          const line = isPostpaid ? 0 : p.price * qty;
          supply += line;
          if (!isPostpaid && p.taxable !== false) vat += Math.round(line * 0.1);
          const label = itemDisplayLabel(p, cartType);
          html += `
            <div class="cart-item">
              <span class="nm">${mEsc(label)}${isPostpaid ? `<br><small class="status-postpaid">${mEsc(mT("shop.postpaidShort"))}</small>` : ""}<br><span class="rm" data-rm="${key}">${mEsc(mT("common.delete"))}</span></span>
              <span class="qtybox">
                <button data-minus="${key}">−</button><span>${qty}</span><button data-plus="${key}">+</button>
              </span>
              <span class="nowrap" style="min-width:78px;text-align:right">${isPostpaid ? mEsc(mT("common.settle")) : won(line)}</span>
            </div>`;
        });
      }

      area.innerHTML = html;
      const canSubmit = cart.size > 0 || !!pendingHall;
      if (!canSubmit) {
        sumArea.innerHTML = "";
        btn.disabled = true;
      } else {
        sumArea.innerHTML = `
          <div class="cart-sum">
            <div class="row"><span>${mEsc(mT("shop.supply"))}</span><span>${won(supply)}</span></div>
            <div class="row"><span>${mEsc(mT("shop.vat"))}</span><span>${won(vat)}</span></div>
            <div class="row total"><span>${mEsc(mT("shop.total"))}</span><span>${won(supply + vat)}</span></div>
            <p class="cart-sum-note">${mEsc(mT("shop.sumNote"))}${cart.size === 0 ? "" : mEsc(mT("shop.sumNotePostpaid"))}</p>
          </div>`;
        btn.disabled = false;
        btn.textContent = mT("shop.submitOrder");
      }

      area.querySelectorAll("[data-plus]").forEach((b) =>
        b.addEventListener("click", () => setQty(b.getAttribute("data-plus"), (cart.get(b.getAttribute("data-plus")) || 0) + 1)));
      area.querySelectorAll("[data-minus]").forEach((b) =>
        b.addEventListener("click", () => setQty(b.getAttribute("data-minus"), (cart.get(b.getAttribute("data-minus")) || 0) - 1)));
      area.querySelectorAll("[data-rm]").forEach((b) =>
        b.addEventListener("click", () => setQty(b.getAttribute("data-rm"), 0)));
    }

    async function placeOrder() {
      const pendingHall = getPendingHallFee();
      if (cart.size === 0 && !pendingHall) return;
      const items = Array.from(cart.entries()).map(([key, qty]) => {
        const [type, id] = key.split(":");
        if (type === "coffin") return { itemType: "coffin", itemRefId: id, qty };
        if (type === "hoengdae") return { itemType: "hoengdae", itemRefId: id, qty };
        if (type === "shroud") return { itemType: "shroud", itemRefId: id, qty };
        if (type === "accessory") return { itemType: "accessory", itemRefId: id, qty };
        if (type === "foodItem") return { itemType: "foodItem", itemRefId: id, qty };
        if (type === "flowerItem") return { itemType: "flowerItem", itemRefId: id, qty };
        if (type === "photoItem") return { itemType: "photoItem", itemRefId: id, qty };
        if (type === "dressItem") return { itemType: "dressItem", itemRefId: id, qty };
        if (type === "hearseItem") return { itemType: "hearseItem", itemRefId: id, qty };
        if (type === "servicePrice") return { itemType: "servicePrice", itemRefId: id, qty };
        if (type === "hallFacilityFee") return { itemType: "hallFacilityFee", itemRefId: id, qty };
        return { itemType: "product", productId: id, qty };
      });
      const memo = prompt(mT("shop.memoPrompt"), "") || "";
      const btn = document.getElementById("orderBtn");
      btn.disabled = true; btn.textContent = mT("shop.submitting");
      try {
        const d = await mApi("/orders", { method: "POST", body: { items, memo } });
        mToast(mT("shop.orderOkToast"));
        location.href = "/pages/member/orders.html?ok=" + encodeURIComponent(d.order.orderNumber);
      } catch (e) {
        mToast(e.message);
        btn.disabled = false; btn.textContent = mT("shop.submitOrder");
      }
    }
  </script>
</body>
</html>
