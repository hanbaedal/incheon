<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>상품 주문 | 상주 전용 서비스</title>
  <link rel="stylesheet" href="../../assets/css/member.css" />
</head>
<body>
  <header id="mHeader"></header>
  <div class="m-wrap">
    <h1 class="m-title">장례 용품·서비스 주문</h1>
    <p class="m-lead">필요하신 품목을 담아 온라인으로 주문하실 수 있습니다. 주문 내역은 관리자 확인 후 처리됩니다.</p>

    <div class="shop-grid">
      <div id="prodArea" class="card"><div class="state">상품을 불러오는 중…</div></div>

      <div class="card cart">
        <div class="card-head">장바구니</div>
        <div class="card-body">
          <div id="cartArea"><div class="cart-empty">담긴 상품이 없습니다.</div></div>
          <div id="cartSum"></div>
          <button class="btn btn-gold btn-block" id="orderBtn" style="margin-top:14px" disabled>주문하기</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../../assets/js/member.js"></script>
  <script>
    let ME = null;
    let PRODUCTS = [];
    const cart = new Map(); // productId -> qty

    (async function () {
      ME = await memberHeader("shop");
      if (!ME) return;
      try {
        PRODUCTS = (await mApi("/products")).items;
        renderProducts();
      } catch (e) {
        document.getElementById("prodArea").innerHTML = `<div class="state">오류: ${mEsc(e.message)}</div>`;
      }
      document.getElementById("orderBtn").addEventListener("click", placeOrder);
    })();

    function renderProducts() {
      const area = document.getElementById("prodArea");
      if (PRODUCTS.length === 0) { area.innerHTML = '<div class="state">현재 판매 중인 상품이 없습니다.</div>'; return; }
      const byCat = {};
      PRODUCTS.forEach((p) => { (byCat[p.category] = byCat[p.category] || []).push(p); });
      let html = '<div class="card-body">';
      Object.keys(byCat).forEach((cat) => {
        html += `<div class="cat-title">${mEsc(cat)}</div>`;
        byCat[cat].forEach((p) => {
          html += `
            <div class="prod">
              <div class="info"><b>${mEsc(p.name)}</b><small>${mEsc(p.description) || "&nbsp;"}</small></div>
              <div style="display:flex;align-items:center;gap:12px">
                <span class="price">${won(p.price)} / ${mEsc(p.unit)}</span>
                <button class="btn btn-sm btn-primary" data-add="${p.id}">담기</button>
              </div>
            </div>`;
        });
      });
      html += "</div>";
      area.innerHTML = html;
      area.querySelectorAll("[data-add]").forEach((b) =>
        b.addEventListener("click", () => addToCart(b.getAttribute("data-add"))));
    }

    function addToCart(id) {
      cart.set(id, (cart.get(id) || 0) + 1);
      renderCart(); mToast("장바구니에 담았습니다.");
    }
    function setQty(id, qty) {
      if (qty <= 0) cart.delete(id); else cart.set(id, qty);
      renderCart();
    }

    function renderCart() {
      const area = document.getElementById("cartArea");
      const sumArea = document.getElementById("cartSum");
      const btn = document.getElementById("orderBtn");
      if (cart.size === 0) {
        area.innerHTML = '<div class="cart-empty">담긴 상품이 없습니다.</div>';
        sumArea.innerHTML = ""; btn.disabled = true; return;
      }
      let supply = 0, vat = 0, html = "";
      cart.forEach((qty, id) => {
        const p = PRODUCTS.find((x) => x.id === id);
        if (!p) return;
        const line = p.price * qty;
        supply += line;
        if (p.taxable) vat += Math.round(line * 0.1);
        html += `
          <div class="cart-item">
            <span class="nm">${mEsc(p.name)}<br><span class="rm" data-rm="${id}">삭제</span></span>
            <span class="qtybox">
              <button data-minus="${id}">−</button><span>${qty}</span><button data-plus="${id}">+</button>
            </span>
            <span class="nowrap" style="min-width:78px;text-align:right">${won(line)}</span>
          </div>`;
      });
      area.innerHTML = html;
      sumArea.innerHTML = `
        <div class="cart-sum">
          <div class="row"><span>공급가액</span><span>${won(supply)}</span></div>
          <div class="row"><span>부가세</span><span>${won(vat)}</span></div>
          <div class="row total"><span>합계</span><span>${won(supply + vat)}</span></div>
        </div>`;
      btn.disabled = false;
      area.querySelectorAll("[data-plus]").forEach((b) => b.addEventListener("click", () => setQty(b.getAttribute("data-plus"), (cart.get(b.getAttribute("data-plus")) || 0) + 1)));
      area.querySelectorAll("[data-minus]").forEach((b) => b.addEventListener("click", () => setQty(b.getAttribute("data-minus"), (cart.get(b.getAttribute("data-minus")) || 0) - 1)));
      area.querySelectorAll("[data-rm]").forEach((b) => b.addEventListener("click", () => setQty(b.getAttribute("data-rm"), 0)));
    }

    async function placeOrder() {
      if (cart.size === 0) return;
      const items = Array.from(cart.entries()).map(([productId, qty]) => ({ productId, qty }));
      const memo = prompt("배송/요청 사항이 있으면 입력해 주세요. (선택)", "") || "";
      const btn = document.getElementById("orderBtn");
      btn.disabled = true; btn.textContent = "주문 처리 중…";
      try {
        const d = await mApi("/orders", { method: "POST", body: { items, memo } });
        mToast("주문이 접수되었습니다.");
        location.href = "/pages/member/orders.html?ok=" + encodeURIComponent(d.order.orderNumber);
      } catch (e) {
        mToast(e.message);
        btn.disabled = false; btn.textContent = "주문하기";
      }
    }
  </script>
</body>
</html>
