<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>빈소 이용 등록 | 상주 전용 서비스</title>
  <link rel="stylesheet" href="../../assets/css/member.css" />
</head>
<body>
  <header id="mHeader"></header>
  <div class="m-wrap">
    <h1 class="m-title">빈소 이용 등록</h1>
    <p class="m-lead">빈소를 선택하고 3·4·5일장 중 기간을 정하면 이용료가 계산됩니다. 고인·발인 정보 입력 후 접수해 주세요.</p>
    <div id="hallArea" class="card"><div class="state">불러오는 중…</div></div>
  </div>

  <script src="../../assets/js/member.js"></script>
  <script>
    let ME = null;
    let HALLS = [];
    let SUMMARY = null;
    let PENDING = null;
    let USAGE = null;
    let SELECTED_HALL_ID = "";
    let SELECTED_FUNERAL_DAYS = 3;
    let FUNERAL_DAY_OPTIONS = [
      { days: 3, label: "3일장" },
      { days: 4, label: "4일장" },
      { days: 5, label: "5일장" },
    ];

    function won(n) { return (Number(n) || 0).toLocaleString("ko-KR") + "원"; }

    function selectedHall() {
      return HALLS.find((h) => String(h.id) === String(SELECTED_HALL_ID)) || null;
    }

    function computeFee(hall, days) {
      if (!hall || hall.isVirtual) return { dailyPrice: 0, funeralDays: null, hallFeeAmount: 0 };
      const dailyPrice = Math.max(0, Number(hall.dailyPrice) || 0);
      const funeralDays = Number(days) || 0;
      return { dailyPrice, funeralDays, hallFeeAmount: dailyPrice * funeralDays };
    }

    function priceBoxHtml(hall, days) {
      if (!hall) return "";
      if (hall.isVirtual) {
        return `<div class="price-box"><p class="hint">무빈소는 별도 빈소 이용료가 없습니다. 상담 후 진행됩니다.</p></div>`;
      }
      if (!days) {
        return `<div class="price-box"><p class="hint-warn">장례 기간(3·4·5일장)을 선택하면 이용료가 계산됩니다.</p></div>`;
      }
      const fee = computeFee(hall, days);
      return `
        <div class="price-box">
          <table>
            <tr><th>단가 (1일)</th><td>${won(fee.dailyPrice)}</td></tr>
            <tr><th>기간</th><td>${mEsc(days)}일장</td></tr>
            <tr><th>금액</th><td>${won(fee.hallFeeAmount)}</td></tr>
          </table>
        </div>`;
    }

    function funeralDaysPicker(selectedDays, hall) {
      if (hall && hall.isVirtual) return "";
      return `
        <h4 class="section-h4 spaced">장례 기간 선택 *</h4>
        <div class="day-grid">${FUNERAL_DAY_OPTIONS.map((o) => `
          <div class="day-pick${Number(selectedDays) === o.days ? " selected" : ""}" data-days="${o.days}">${mEsc(o.label)}</div>
        `).join("")}</div>
        ${priceBoxHtml(hall || selectedHall(), selectedDays)}`;
    }

    function bindFuneralDays() {
      document.querySelectorAll("[data-days]").forEach((el) => {
        el.addEventListener("click", () => {
          SELECTED_FUNERAL_DAYS = Number(el.getAttribute("data-days"));
          const area = document.getElementById("funeralDaysArea");
          if (area) {
            area.innerHTML = funeralDaysPicker(SELECTED_FUNERAL_DAYS, selectedHall());
            bindFuneralDays();
          }
        });
      });
    }

    function toDateInputValue(s) {
      const m = String(s || "").trim().match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
      if (!m) return "";
      const p = (n) => String(n).padStart(2, "0");
      return `${m[1]}-${p(m[2])}-${p(m[3])}`;
    }
    function toTimeInputValue(s) {
      const m = String(s || "").trim().match(/^(\d{1,2}):(\d{2})/);
      if (!m) return "";
      const p = (n) => String(n).padStart(2, "0");
      return `${p(m[1])}:${p(m[2])}`;
    }

    function formValues(prefix) {
      return {
        deceasedName: document.getElementById(prefix + "_deceasedName").value.trim(),
        chiefMourner: document.getElementById(prefix + "_chiefMourner").value.trim(),
        relationship: document.getElementById(prefix + "_relationship").value.trim(),
        age: document.getElementById(prefix + "_age").value.trim(),
        enshrinedAt: document.getElementById(prefix + "_enshrinedAt").value.trim(),
        funeralDate: document.getElementById(prefix + "_funeralDate").value.trim(),
        funeralTime: document.getElementById(prefix + "_funeralTime").value.trim(),
        burialSite: document.getElementById(prefix + "_burialSite").value.trim(),
      };
    }

    function usageFormHtml(prefix, data) {
      data = data || {};
      const locked = !!data.scheduleLocked;
      const lockAttr = locked ? " disabled readonly" : "";
      return `
        <div class="m-form-row">
          <div><label for="${prefix}_deceasedName">고인명 *</label><input id="${prefix}_deceasedName" value="${mEsc(data.deceasedName || "")}" /></div>
          <div><label for="${prefix}_chiefMourner">상주 *</label><input id="${prefix}_chiefMourner" value="${mEsc(data.chiefMourner || ME.name || "")}" /></div>
        </div>
        <div class="m-form-row">
          <div><label for="${prefix}_relationship">고인과의 관계</label><input id="${prefix}_relationship" value="${mEsc(data.relationship || "")}" placeholder="예: 장남" /></div>
          <div><label for="${prefix}_age">향년</label><input id="${prefix}_age" value="${mEsc(data.age || "")}" placeholder="예: 향년 84세" /></div>
        </div>
        ${locked ? '<p class="muted" style="margin:0 0 8px;font-size:13px">예약(주문) 접수 후 발인 일자·시각은 변경할 수 없습니다.</p>' : ""}
        <div class="m-form-row">
          <div><label for="${prefix}_funeralDate">발인 일자 *</label><input type="date" id="${prefix}_funeralDate" value="${mEsc(toDateInputValue(data.funeralDate))}"${lockAttr} /></div>
          <div><label for="${prefix}_funeralTime">발인 시각</label><input type="time" id="${prefix}_funeralTime" value="${mEsc(toTimeInputValue(data.funeralTime))}" step="60"${lockAttr} /></div>
        </div>
        <div class="m-form-row">
          <div><label for="${prefix}_enshrinedAt">입관/안치</label><input id="${prefix}_enshrinedAt" value="${mEsc(data.enshrinedAt || "")}" placeholder="예: 2026-07-19 14:00" /></div>
          <div><label for="${prefix}_burialSite">장지</label><input id="${prefix}_burialSite" value="${mEsc(data.burialSite || "")}" /></div>
        </div>`;
    }

    function hallPickList(selectedId) {
      if (!HALLS.length) return '<div class="state">현재 신청 가능한 빈소가 없습니다.</div>';
      return `<div class="hall-grid">${HALLS.map((h) => {
        const can = h.canRequestNow !== false;
        const sel = String(h.id) === String(selectedId) ? " selected" : "";
        const dis = can ? "" : " disabled";
        const spec = h.specLabel ? `<small>${mEsc(h.specLabel)}</small>` : "";
        return `
          <div class="hall-pick${sel}${dis}" data-pick="${h.id}" data-can="${can ? "1" : "0"}">
            <div class="info">
              <b>${mEsc(h.name || h.hallNumber)}</b>
              ${spec}
              <small>${mEsc(h.areaLabel || "")}${h.capacity ? " · " + mEsc(h.capacity) : ""}${!h.isVirtual && h.dailyPrice ? " · 1일 " + won(h.dailyPrice) : ""}</small>
              <small>${mEsc(h.feature || "")}</small>
              ${h.availableLabel ? `<small class="${can ? "avail-ok" : "avail-wait"}">${mEsc(h.availableLabel)}</small>` : ""}
            </div>
          </div>`;
      }).join("")}</div>`;
    }

    function bindHallPick() {
      document.querySelectorAll("[data-pick]").forEach((el) => {
        el.addEventListener("click", () => {
          if (el.getAttribute("data-can") !== "1") return;
          SELECTED_HALL_ID = el.getAttribute("data-pick");
          document.querySelectorAll("[data-pick]").forEach((x) => x.classList.remove("selected"));
          el.classList.add("selected");
          const hall = selectedHall();
          if (hall && hall.isVirtual) SELECTED_FUNERAL_DAYS = null;
          else if (!SELECTED_FUNERAL_DAYS) SELECTED_FUNERAL_DAYS = 3;
          const daysArea = document.getElementById("funeralDaysArea");
          if (daysArea) {
            daysArea.innerHTML = funeralDaysPicker(SELECTED_FUNERAL_DAYS, hall);
            bindFuneralDays();
          }
        });
      });
    }

    async function loadAll() {
      const [avail, reqs, usageRes] = await Promise.all([
        mApi("/hall-requests/available"),
        mApi("/hall-requests/mine"),
        mApi("/hall-usages/mine"),
      ]);
      HALLS = avail.items || [];
      SUMMARY = avail;
      FUNERAL_DAY_OPTIONS = avail.funeralDayOptions || FUNERAL_DAY_OPTIONS;
      PENDING = (reqs.items || []).find((r) => r.status === "pending") || null;
      USAGE = usageRes.usage || null;
      if (PENDING && PENDING.hall) {
        SELECTED_HALL_ID = PENDING.hall.id;
        SELECTED_FUNERAL_DAYS = PENDING.funeralDays || 3;
      }
    }

    function render() {
      const area = document.getElementById("hallArea");
      if (USAGE && USAGE.status === "active") {
        area.innerHTML = `
          <div class="card-head">배정된 빈소</div>
          <div class="card-body">
            <div class="notice-box">${USAGE.scheduleLocked ? "장례 예약이 접수되어 발인 일자·시각은 변경할 수 없습니다." : "빈소가 배정되었습니다. 발인 정보를 수정할 수 있습니다."}</div>
            <p class="hall-assigned"><b>${mEsc(USAGE.hall ? USAGE.hall.name : "-")}</b>${USAGE.hall && USAGE.hall.specLabel ? " · " + mEsc(USAGE.hall.specLabel) : ""}${USAGE.hall && USAGE.hall.feature ? " · " + mEsc(USAGE.hall.feature) : ""}</p>
            ${USAGE.hall && !USAGE.hall.isVirtual && USAGE.funeralDays ? priceBoxHtml({ ...USAGE.hall, dailyPrice: USAGE.dailyPrice }, USAGE.funeralDays) : ""}
            <div class="m-form">${usageFormHtml("u", USAGE)}</div>
            <div class="m-actions">
              <button class="btn btn-primary" id="saveUsage">이용 정보 저장</button>
              <a class="btn" href="/pages/member/shop.html">장례 예약으로 이동</a>
            </div>
          </div>`;
        document.getElementById("saveUsage").addEventListener("click", saveUsage);
        return;
      }

      if (PENDING) {
        SELECTED_HALL_ID = PENDING.hall ? PENDING.hall.id : SELECTED_HALL_ID;
        SELECTED_FUNERAL_DAYS = PENDING.funeralDays || SELECTED_FUNERAL_DAYS || 3;
        area.innerHTML = `
          <div class="card-head">빈소 신청 · 승인 대기</div>
          <div class="card-body">
            <div class="notice-box">신청하신 빈소 <b>${mEsc(PENDING.hall ? PENDING.hall.name : "-")}</b>는 관리자 승인 대기 중입니다. 아래 정보를 수정할 수 있습니다.</div>
            <h4 class="section-h4">선택 빈소</h4>
            ${hallPickList(SELECTED_HALL_ID)}
            <div id="funeralDaysArea">${funeralDaysPicker(SELECTED_FUNERAL_DAYS, selectedHall())}</div>
            <h4 class="section-h4 spaced">이용 정보</h4>
            <div class="m-form">${usageFormHtml("p", PENDING)}</div>
            <div class="m-actions">
              <button class="btn btn-primary" id="savePending">신청 정보 저장</button>
            </div>
          </div>`;
        bindHallPick();
        bindFuneralDays();
        document.getElementById("savePending").addEventListener("click", savePending);
        return;
      }

      let summary = "";
      if (SUMMARY && SUMMARY.activePhysicalCount > 0) {
        summary = `<div class="notice-box">현재 빈소 <b>${SUMMARY.activePhysicalCount}/${SUMMARY.capacity}</b>실 이용 중`;
        if (SUMMARY.freePhysicalSlots > 0) summary += ` · <b>${SUMMARY.freePhysicalSlots}</b>실 즉시 배정 가능`;
        else if (SUMMARY.nextAvailableLabel) summary += ` · ${mEsc(SUMMARY.nextAvailableLabel)}`;
        summary += "</div>";
      }

      area.innerHTML = `
        <div class="card-head">1. 빈소 선택</div>
        <div class="card-body">
          ${summary}
          ${hallPickList(SELECTED_HALL_ID)}
          <div id="funeralDaysArea">${funeralDaysPicker(SELECTED_FUNERAL_DAYS, selectedHall())}</div>
          <h4 class="section-h4 spaced">2. 이용 정보 입력</h4>
          <div class="m-form">${usageFormHtml("n", { chiefMourner: ME.name })}</div>
          <div class="m-actions">
            <button class="btn btn-primary" id="submitReq">빈소 이용 신청</button>
          </div>
        </div>`;
      bindHallPick();
      bindFuneralDays();
      document.getElementById("submitReq").addEventListener("click", submitRequest);
    }

    async function submitRequest() {
      if (!SELECTED_HALL_ID) { mToast("빈소를 선택해 주세요."); return; }
      const hall = selectedHall();
      if (hall && !hall.isVirtual && !SELECTED_FUNERAL_DAYS) { mToast("장례 기간(3·4·5일장)을 선택해 주세요."); return; }
      const body = { hallId: SELECTED_HALL_ID, funeralDays: hall && hall.isVirtual ? null : SELECTED_FUNERAL_DAYS, ...formValues("n") };
      if (!body.deceasedName || !body.funeralDate) { mToast("고인명과 발인 일자를 입력해 주세요."); return; }
      try {
        await mApi("/hall-requests", { method: "POST", body });
        mToast("빈소 이용 신청이 접수되었습니다.");
        await loadAll();
        render();
      } catch (e) { mToast(e.message); }
    }

    async function savePending() {
      const body = formValues("p");
      if (SELECTED_HALL_ID) body.hallId = SELECTED_HALL_ID;
      const hall = selectedHall();
      if (hall && !hall.isVirtual) body.funeralDays = SELECTED_FUNERAL_DAYS;
      if (!body.deceasedName || !body.funeralDate) { mToast("고인명과 발인 일자를 입력해 주세요."); return; }
      try {
        await mApi("/hall-requests/mine", { method: "PATCH", body });
        mToast("신청 정보가 저장되었습니다.");
        await loadAll();
        render();
      } catch (e) { mToast(e.message); }
    }

    async function saveUsage() {
      const body = formValues("u");
      if (!body.deceasedName || !body.funeralDate) { mToast("고인명과 발인 일자를 입력해 주세요."); return; }
      try {
        await mApi("/hall-usages/mine", { method: "PATCH", body });
        mToast("이용 정보가 저장되었습니다.");
        await loadAll();
        render();
      } catch (e) { mToast(e.message); }
    }

    (async function () {
      ME = await memberHeader("hall");
      if (!ME) return;
      try {
        await loadAll();
        render();
      } catch (e) {
        document.getElementById("hallArea").innerHTML = `<div class="state">오류: ${mEsc(e.message)}</div>`;
      }
    })();
  </script>
</body>
</html>
