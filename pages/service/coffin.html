<body>
  <div id="pageContent">
    <h2 class="page-title"><span class="bar"></span>관·횡대</h2>
    <p class="page-lead">고인을 모시는 관과 하관 시 사용하는 횡대를 재질별로 안내합니다.</p>

    <div class="block">
      <h3>관 종류</h3>
      <p>아래 규격표는 장례식장에서 사용하는 관·횡대 품목을 안내합니다. 규격 단위는 ㎜입니다.</p>
    </div>

    <div class="block">
      <h3>횡대 안내</h3>
      <p>횡대는 매장 시 하관 후 관 위에 가로로 덮는 판재로, 전통 장례 예법에 따라 사용됩니다.
        매장/화장 여부와 예법에 맞추어 필요 여부를 안내해 드립니다.</p>
      <p class="note"><strong>안내</strong> &nbsp;화장을 선택하신 경우 화장용 관을 사용하며 횡대는 필요하지 않습니다.</p>
    </div>

    <div id="serviceProducts"></div>
  </div>

  <script>
    window.SITE_BASE = "../../";
    window.SITE_PAGE = { section: "service", sub: "coffin" };
    window.PAGE_I18N = {

    <div class="block">

      <p class="note"><strong>提示</strong> &nbsp;选择火葬时使用火葬用棺，不需横帒。</p>
    </div>`,
      en: `
