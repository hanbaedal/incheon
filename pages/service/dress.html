  <title>상복 대여 | 근로복지공단 인천병원 장례식장</title>
  <link rel="stylesheet" href="../../assets/css/style.css" />

<body>
  <div id="pageContent">
    <h2 class="page-title"><span class="bar"></span>상복 대여</h2>
    <p class="page-lead">상주와 유가족의 상복(예복)을 대여해 드립니다.</p>

    <div class="block">
      <h3>예복 안내</h3>
      <p>상주 및 유가족이 착용하는 상복을 <strong>예복정장, 여성예복, 와이셔츠, 벨트, 양말, 구두, 넥타이, 런닝셔츠</strong> 품목별·
        치수별로 대여해 드립니다. 착용 후 반납하는 대여 방식입니다.</p>
    </div>

    <div class="block">
      <h3>이용 안내</h3>
      <ul class="dot">
        <li>치수별로 준비되어 있으며, 착용 후 반납하는 대여 방식입니다.</li>
        <li>필요 수량을 빈소 배정 시 함께 알려 주세요.</li>
        <li>품목·치수·가격은 아래 표를 참고해 주세요. (로그인 시 가격 확인 가능)</li>
      </ul>
    </div>

    <div id="serviceProducts"></div>
  </div>

  <script>
    window.SITE_BASE = "../../";
    window.SITE_PAGE = { section: "service", sub: "dress" };
    window.PAGE_I18N = {
      zh: `
    <h2 class="page-title"><span class="bar"></span>丧服租赁</h2>
    <p class="page-lead">为丧主与遗属租赁丧服(礼服)。</p>
    <div class="block">
      <h3>礼服说明</h3>
      <p>为丧主及遗属按品目·尺寸租赁丧服。备有女士礼服、衬衫、皮带、袜子、皮鞋、领带、汗衫等，穿着后归还。</p>
    </div>
    <div class="block">
      <h3>使用须知</h3>
      <ul class="dot">
        <li>按尺寸备有，穿着后归还的租赁方式。</li>
        <li>请在灵堂分配时一并告知所需数量。</li>
        <li>品目·价格请参考下表。（登录后可查看价格）</li>
      </ul>
    </div>`,
      en: `
    <h2 class="page-title"><span class="bar"></span>Mourning Attire</h2>
    <p class="page-lead">Mourning attire rental for the chief mourner and family.</p>
    <div class="block">
      <h3>Attire Rental</h3>
      <p>We rent mourning attire by item and size: women's attire, dress shirts, belts, socks, shoes, ties, undershirts, and more. Items are returned after use.</p>
    </div>
    <div class="block">
      <h3>Usage Notes</h3>
      <ul class="dot">
        <li>Available by size; a rental system where attire is returned after use.</li>
        <li>Please tell us the quantity needed when the hall is assigned.</li>
        <li>See the table below for items and prices. (Prices visible after login)</li>
      </ul>
    </div>`,
    };
