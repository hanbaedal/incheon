<body>
  <div id="pageContent">
    <h2 class="page-title"><span class="bar"></span>수의(壽衣)</h2>
    <p class="page-lead">고인의 마지막 의복인 수의를 소재와 격식에 맞추어 준비해 드립니다.</p>

    <div class="block">
      <h3>수의 종류</h3>
      <table class="tbl">
        <thead><tr><th>구분</th><th>소재</th><th>특징</th></tr></thead>
        <tbody>
          <tr><th>삼베 수의</th><td>대마(삼베)</td><td>전통 격식을 갖춘 대표적인 수의</td></tr>
          <tr><th>안동포 수의</th><td>고급 안동 대마</td><td>정교한 직조의 고급형</td></tr>
          <tr><th>면 수의</th><td>순면</td><td>부드럽고 정갈한 소재</td></tr>
          <tr><th>인견 수의</th><td>인견(레이온)</td><td>매끄럽고 광택 있는 소재</td></tr>
        </tbody>
      </table>
    </div>

    <div class="block">
      <h3>수의 구성</h3>
      <ul class="dot">
        <li>남성/여성 수의 일습(속옷·겉옷·버선·악수·두건 등 일체)</li>
        <li>고인의 체격에 맞춘 치수 선택</li>
        <li>종교 및 예법에 따른 맞춤 구성 상담 가능</li>
      </ul>
    </div>

    <div id="serviceProducts"></div>
  </div>

  <script>
    window.SITE_BASE = "../../";
    window.SITE_PAGE = { section: "service", sub: "shroud" };
    window.PAGE_I18N = {
      zh: `
    <h2 class="page-title"><span class="bar"></span>寿衣</h2>
    <p class="page-lead">依材质与礼制，为逝者准备最后的衣装——寿衣。</p>
    <div class="block">
      <h3>寿衣种类</h3>
      <table class="tbl"><thead><tr><th>区分</th><th>材质</th><th>特点</th></tr></thead><tbody>

        <tr><th>人造丝寿衣</th><td>人造丝</td><td>光滑且有光泽的材质</td></tr>

    </div>
    <div class="block">
      <h3>寿衣构成</h3>
      <ul class="dot">
        <li>男/女寿衣整套(内衣·外衣·袜·握手·头巾等一应俱全)</li>
        <li>依逝者体型选择尺寸</li>

    <div class="block">
      <h3>Shroud Types</h3>
      <table class="tbl"><thead><tr><th>Type</th><th>Material</th><th>Features</th></tr></thead><tbody>
        <tr><th>Hemp</th><td>Hemp</td><td>The representative, traditional shroud</td></tr>

        <li>Full men's/women's shroud set (undergarments, outer garments, socks, hand covers, headpiece)</li>
