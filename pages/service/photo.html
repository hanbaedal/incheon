<body>
  <div id="pageContent">
    <h2 class="page-title"><span class="bar"></span>영정 사진</h2>
    <p class="page-lead">고인의 영정 사진을 정성껏 제작해 드립니다.</p>

    <div class="block">
      <h3>사진실 안내</h3>
      <p>장내 사진실에서 영정, 액자, 증명사진, 즉석사진을 제작·촬영해 드립니다.
        보유하신 사진(휴대폰 사진 포함)을 활용한 보정·합성도 가능합니다.</p>
      <p class="note" style="margin-top:12px">※ 사진실 문의: 032-205-1100 (24시간)</p>
    </div>

    <div class="block">
      <h3>이용 안내</h3>
      <ul class="dot">
        <li>보유하신 사진(휴대폰 사진 포함)을 가져오시면 보정 후 제작합니다.</li>
        <li>영정 액자는 표준 규격으로 제공되며, 제작 시간은 30분~1시간 내외입니다.</li>
        <li>발인 후 사진은 유가족께 전달해 드립니다.</li>
      </ul>
    </div>

    <div id="serviceProducts"></div>
  </div>

  <script>
    window.SITE_BASE = "../../";
    window.SITE_PAGE = { section: "service", sub: "photo" };
    window.PAGE_I18N = {
      zh: `
    <h2 class="page-title"><span class="bar"></span>遗照制作</h2>
    <p class="page-lead">为您用心制作逝者的遗照。</p>
    <div class="block">
      <h3>遗照制作</h3>
      <p>若无备好的照片或需要修饰，馆内照相室将迅速为您制作遗照。也可利用现有照片进行修饰·放大、服装合成等。</p>
      <div class="grid-2">
        <div class="info-card"><div class="ic-ico">🖼</div><h4>遗照输出</h4><p>规格相框制作及系带</p></div>
        <div class="info-card"><div class="ic-ico">🎨</div><h4>照片修饰</h4><p>调色·服装合成·背景处理</p></div>
      </div>
    </div>
    <div class="block">
      <h3>使用须知</h3>
      <ul class="dot">
        <li>带来现有照片(含手机照片)即可修饰后制作。</li>
        <li>遗照相框为标准规格，制作时间约30分钟~1小时。</li>
        <li>出殡后照片将交予遗属。</li>
      </ul>
    </div>`,
      en: `
    <h2 class="page-title"><span class="bar"></span>Portrait Photo</h2>
    <p class="page-lead">We carefully prepare the memorial portrait of the deceased.</p>
    <div class="block">

      <p>If there is no photo ready or retouching is needed, our on-site studio produces the portrait quickly. Retouching, enlargement, and attire compositing from your photo are also available.</p>
      <div class="grid-2">

      <ul class="dot">

        <li>Frames are standard size; production takes about 30 min to 1 hour.</li>
        <li>The photo is given to the family after the procession.</li>
      </ul>

    };
